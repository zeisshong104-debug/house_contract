<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閱讀台灣預售屋合約相關文件</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-light: #4a4a4a;
    --ink-faint: #888;
    --paper: #f7f4ef;
    --paper-dark: #ede9e2;
    --paper-darker: #e0dbd2;
    --accent: #8b2c2c;
    --accent-light: #c94f4f;
    --green: #2a6b3c;
    --green-light: #e8f4ec;
    --red-light: #fdf0f0;
    --border: #c8c0b4;
    --border-light: #ddd8cf;
    --shadow: rgba(26,26,26,0.08);
    --radius: 4px;
    --font-serif: 'Noto Serif TC', serif;
    --font-sans: 'Noto Sans TC', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 17px;
    line-height: 1.9;
  }

  /* ─── HEADER ─── */
  header {
    background: #1c2b3a;
    color: #e8e4de;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    border-bottom: 3px solid #c8a96e;
  }
  .header-title {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 0.06em;
    color: #ffffff;
  }
  .header-subtitle {
    font-size: 12px;
    color: #a0b4c8;
    letter-spacing: 0.04em;
    margin-top: 4px;
    line-height: 1.5;
  }

  /* ─── SEARCH BAR ─── */
  .search-bar {
    background: #1c2b3a;
    border-bottom: 1px solid #2e4055;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-label {
    font-size: 13px;
    font-weight: 500;
    color: #a0b4c8;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  .search-icon {
    color: #a0b4c8;
    font-size: 18px;
    flex-shrink: 0;
  }
  .search-wrapper {
    flex: 1;
    position: relative;
  }
  #search-input {
    width: 100%;
    background: #ffffff;
    border: 2px solid #4a7fa5;
    border-radius: 6px;
    padding: 11px 44px 11px 16px;
    font-family: var(--font-sans);
    font-size: 17px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search-input:focus {
    border-color: #c8a96e;
    box-shadow: 0 0 0 3px rgba(200,169,110,0.25);
  }
  #search-input::placeholder { color: #aaa; font-size: 16px; }
  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: #ccc;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 13px;
    color: white;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
  }
  .search-clear.visible { display: flex; }
  .search-clear:hover { background: #999; }
  #search-count {
    font-size: 13px;
    color: #c8a96e;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    min-width: 64px;
    text-align: right;
    font-weight: 500;
  }

  /* ─── TABS ─── */
  .tabs {
    background: #243447;
    border-bottom: 2px solid #2e4055;
    padding: 0 32px;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 14px 24px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    color: #7a9ab8;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    margin-bottom: -2px;
    white-space: nowrap;
  }
  .tab-btn:hover { color: #e8e4de; }
  .tab-btn.active {
    color: #c8a96e;
    border-bottom-color: #c8a96e;
    background: var(--paper);
  }
  .tab-count {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    color: #7a9ab8;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }
  .tab-btn.active .tab-count {
    background: rgba(200,169,110,0.2);
    color: #c8a96e;
  }

  /* ─── LAYOUT ─── */
  .main-layout {
    display: flex;
    height: calc(100vh - 130px);
  }

  /* ─── SIDEBAR / TOC ─── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--paper-dark);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }
  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .toc-section-header {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    padding: 12px 16px 6px;
    text-transform: uppercase;
  }
  .toc-item {
    display: block;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 6px 16px;
    font-family: var(--font-sans);
    font-size: 12.5px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1.5;
    border-left: 2px solid transparent;
  }
  .toc-item:hover { background: var(--paper-darker); color: var(--ink); }
  .toc-item.active {
    background: white;
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .toc-item.hidden { display: none; }
  .toc-divider {
    height: 1px;
    background: var(--border-light);
    margin: 8px 16px;
  }

  /* ─── CONTENT AREA ─── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .content-area::-webkit-scrollbar { width: 6px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── SECTION CARD ─── */
  .section-card {
    border-bottom: 1px solid var(--border-light);
    padding: 28px 40px;
    transition: background 0.15s;
  }
  .section-card:hover { background: rgba(255,255,255,0.5); }
  .section-card.hidden { display: none; }
  .section-card.highlight { background: #fffde8; }

  .section-title {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 12px;
    letter-spacing: 0.03em;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .section-num {
    color: var(--accent);
    font-weight: 300;
    flex-shrink: 0;
  }
  .section-content {
    color: var(--ink-light);
    font-size: 15.5px;
    line-height: 2;
    white-space: pre-wrap;
    word-break: break-all;
  }
  mark {
    background: #ffe082;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ─── AMENDMENTS TAB ─── */
  .amendments-container {
    padding: 28px 40px;
    max-width: 980px;
  }
  .amendments-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .amendments-meta {
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  /* 快速索引 */
  .quick-nav {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 28px;
  }
  .quick-nav-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .quick-nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .quick-nav-btn {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-nav-btn:hover { background: #1c2b3a; color: white; border-color: #1c2b3a; }
  .quick-nav-btn.nav-land { border-color: #4a7fa5; color: #2d5fa0; }
  .quick-nav-btn.nav-land:hover { background: #2d5fa0; color: white; }

  /* 分類 header */
  .category-header {
    padding: 10px 0 8px;
    margin: 24px 0 12px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .category-header-title {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .category-header-sub {
    font-size: 12px;
    color: var(--ink-faint);
  }
  .category-header:first-of-type { margin-top: 0; }

  .amendment-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px var(--shadow);
    scroll-margin-top: 20px;
  }
  .amendment-card.hidden { display: none; }

  .amendment-header {
    background: #1c2b3a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .amendment-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .amendment-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .badge-land { background: #3a5f8a; color: #b8d4f0; }
  .badge-house { background: #5a3a1a; color: #f0cca0; }
  .amendment-title {
    font-weight: 600;
    font-size: 15px;
    color: #e8e4de;
    letter-spacing: 0.02em;
  }
  .amendment-page {
    font-size: 11px;
    color: #6a8aaa;
    white-space: nowrap;
  }

  /* diff 內容 */
  .diff-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .diff-before, .diff-after {
    padding: 18px 22px;
    font-size: 15px;
    line-height: 1.95;
  }
  .diff-before {
    background: #fff8f8;
    border-right: 1px solid var(--border-light);
  }
  .diff-after { background: #f6fdf7; }
  .diff-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .diff-label-before { color: #b03030; }
  .diff-label-after { color: #1e6b3a; }
  .diff-text {
    color: var(--ink);
    white-space: pre-wrap;
  }

  /* del / ins 樣式 */
  .diff-text del {
    text-decoration: line-through;
    background: #ffd0d0;
    color: #8b1a1a;
    border-radius: 2px;
    padding: 0 2px;
    text-decoration-color: #c94f4f;
    text-decoration-thickness: 2px;
  }
  .diff-text ins {
    text-decoration: none;
    background: #c6f0cc;
    color: #1a5c2a;
    border-radius: 2px;
    padding: 0 2px;
    font-style: normal;
  }

  /* 修正事由 */
  .amendment-reason {
    padding: 12px 22px;
    background: #fffbec;
    border-top: 2px solid #f0d060;
    font-size: 14px;
    color: #6b5000;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.7;
  }
  .reason-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #8b6800;
    background: #f0d060;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 60px 40px;
    color: var(--ink-faint);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ─── PANEL TABS ─── */
  .tab-panel { display: none; height: 100%; }
  .tab-panel.active { display: flex; height: 100%; }
  #tab-amendments.active { display: block; height: auto; overflow-y: auto; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .search-bar { padding: 12px 16px; }
    .search-label { display: none; }
    .tabs { padding: 0 8px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 12px 14px; font-size: 14px; }
    .amendments-container { padding: 16px; }
    .quick-nav-links { gap: 6px; }
    .quick-nav-btn { font-size: 12px; padding: 4px 10px; }
    .diff-row { grid-template-columns: 1fr; }
    .diff-before { border-right: none; border-bottom: 1px solid var(--border-light); }
    .section-card { padding: 20px 16px; }
    header { padding: 14px 16px; }
    .header-title { font-size: 17px; }
    .header-subtitle { font-size: 11px; }
    #search-input { font-size: 16px; }
    .amendments-title { font-size: 18px; }
    .amendment-page { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">閱讀台灣預售屋合約相關文件</div>
    <div class="header-subtitle">閱讀台灣房屋土地預定買賣契約書審閱本 ＋ 0813 合約差異化對照表</div>
  </div>
</header>

<div class="search-bar">
  <span class="search-label">🔍 全文搜尋</span>
  <div class="search-wrapper">
    <input type="text" id="search-input" placeholder="輸入條文關鍵字，例如：違約、面積、貸款…" autocomplete="off" spellcheck="false">
    <button class="search-clear" id="search-clear" title="清除搜尋">✕</button>
  </div>
  <span id="search-count"></span>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="amendments">
    修正清單
    <span class="tab-count" id="count-amendments">8</span>
  </button>
  <button class="tab-btn" data-tab="house">
    房屋買賣契約書
    <span class="tab-count" id="count-house">80</span>
  </button>
  <button class="tab-btn" data-tab="land">
    土地買賣契約書
    <span class="tab-count" id="count-land">31</span>
  </button>
</div>

<!-- AMENDMENTS TAB -->
<div id="tab-amendments" class="tab-panel active">
  <div class="amendments-container">
    <div class="amendments-title">合約修正清單</div>
    <div class="amendments-meta">本文件列出與原版本之差異說明，含土地合約及房屋合約附件建材說明之修正項目。標記 <span style="background:#ffd0d0;color:#8b1a1a;padding:0 4px;border-radius:2px;font-size:12px;">刪除線</span> 為移除內容，<span style="background:#c6f0cc;color:#1a5c2a;padding:0 4px;border-radius:2px;font-size:12px;">底色標記</span> 為新增或修正內容。</div>
    <div id="quick-nav-container"></div>
    <div id="amendments-list"></div>
    <div id="amendments-empty" class="empty-state" style="display:none">
      <div class="empty-icon">📄</div>
      <div class="empty-text">查無符合的修正項目</div>
    </div>
  </div>
</div>

<!-- HOUSE CONTRACT TAB -->
<div id="tab-house" class="tab-panel">
  <div class="sidebar" id="sidebar-house"></div>
  <div class="content-area" id="content-house"></div>
</div>

<!-- LAND CONTRACT TAB -->
<div id="tab-land" class="tab-panel">
  <div class="sidebar" id="sidebar-land"></div>
  <div class="content-area" id="content-land"></div>
</div>

<script>
// ─── DATA ───
const CONTRACT_DATA = [{"doc":"房屋預定買賣契約書","sections":[{"id":"intro","title":"契約前言","content":"房 屋 預 定 買 賣 契 約 書\n（以下簡稱買方）\n立契約書人\n丞石建築開發有限公司 （以下簡稱賣方）\n茲為『閱讀台灣』（以下簡稱「本社區」）房屋預定買賣事宜，經買、賣\n雙方同意訂立本房屋預定買賣契約書（以下簡稱「本契約」）。"},{"id":"sec_1","title":"第一條：契約審閱期","content":"本契約於中華民國 年 月 日經買方攜回審閱\n日（契約審閱期間不得少於五日），經雙方協商後合意訂定\n條款如下，以資共同遵守：\n【買方簽章： 】\n【賣方簽章：丞石建築開發有限公司】\n法定代理人：彭智祺"},{"id":"sec_2","title":"第二條：賣方對廣告之義務","content":"賣方應確保廣告內容之真實，本社區預售屋之廣告宣傳品及其所記\n載之建材設備說明、房屋及停車位平面配置圖與位置示意圖，為本\n契約之一部分。"},{"id":"sec_3","title":"第三條：預定買賣標示及停車位規格","content":"一、土地座落：\n新北市泰山區信華段五小段 43、43-1、43-2、46、47、48、\n49、50、51、59、60、60-1 地號等 12 筆土地，使用分區為\n都市計畫內第三種住宅區，面積為 6462.77 平方公尺（計\n1954.99 坪）如因土地分割、合併或地籍圖重測，則依新地\n號、新面積辦理產權登記。\n\n二、房屋座落：\n本基地內興建之『閱讀台灣』編號 棟 樓房屋（共\n計壹戶）（以下簡稱本戶房屋），共計本社區 289 戶，為新\n北市政府工務局核准 110 年 06 月 01 日建造執照 110 泰建\n字第 00269 號。詳如建造執照影本附件（十二）。\n三、停車位性質、位置、型式、編號、規格：\n（一）座落地下 層 號平面式車位；車位規格\n□寬 230 公分×長 550 公分×高度最低 210 公分\n□寬 250 公分×長 550 公分×高度最低 210 公分\n□寬 250 公分×長 600 公分×高度最低 210 公分\n□寬 350 公分×長 600 公分×高度最低 210 公分\n屬於□1.法定汽車停車位 □2.自設汽車停車位\n□3.行動不便汽車停車位\n上開該停車位無獨立權狀，其車位面積含車道及其他\n必要空間共計：\n□ 貳拾點陸參 平方公尺（陸點貳肆坪）\n□ 壹拾玖點參陸 平方公尺（伍點捌陸坪）\n如停車空間位於共有部分且無獨立權狀者，其面積應\n按車位（格）數量、型式種類、車位大小、位置、使\n用性質或其他與停車空間有關之因素，依本項第二款\n之比例計算之。詳如平面圖影本如附件（十）。\n（二）停車空間面積占共有部分總面積之比例為\n%，其持分產權依地政法令規定登記。\n（三）買方同意汽車停車空間依照本條規定之規格尺寸為\n主，登記持分依照地政登記為主。\n（四）本汽車停車位應依相關法令管理使用。基於社區住戶\n\n使用機車停車位之需要，停車位購買人同意永久無償\n提供車道及必要空間供住戶使用。未購買停車位之承\n購戶，已充分認知本房地總價並不包括停車位之價\n款，且所購房屋坪數其地下室應有部分（持分）面積\n亦未含停車位之應有部分（持分）面積。除緊急避難\n及公共設施維修等共同利益之使用及其他法律之規\n定外，已確認並同意對本預售房屋之地下室應有部分\n（持分），並無使用管理權等任何權利。\n（五）買方購買之停車位屬自行增設停車位者，雙方如有另\n訂該種停車位買賣契約書，其有關事宜悉依該契約約\n定為之。"},{"id":"sec_4","title":"第四條：房屋出售面積及認定標準","content":"一、房屋面積：房屋平面圖如附件（八）\n佰 拾 點 平方公尺\n本房屋總面積\n（ 拾 點 坪）包括：\n佰 拾 點 平方公尺\n一、專有部分之面積\n（ 拾 點 坪）\n佰 拾 點 平方公尺\n（一）主建物之面積\n（ 拾 點 坪）\n佰 拾 點 平方公尺\n（二）附屬建物陽台面積\n（ 拾 點 坪）\n佰 拾 點 平方公尺\n二、共有部分面積\n（ 拾 點 坪）\n三、主建物面積占本房屋登記總面積之比例 點 %。\n四、本契約買賣汽車停車位含車道及其他必要空間持分面積\n□ 貳拾點陸參 平方公尺（陸點貳肆坪）\n□ 壹拾玖點參陸 平方公尺（伍點捌陸坪）\n\n二、本契約建築面積所佔之基地持分產權，土地持分說明如下：\n（一）房屋土地持分：土地持分由每戶按當戶房屋專有部分\n面積占全部房屋專有部分面積總和之比例分算。\n（二）以建照變更後核准圖面為準。\n三、主建物面積：為一般所稱之室內面積。\n四、附屬建物面積：陽台，面積依據工務局核發之建照圖計算。\n各戶附屬建物之項目以完工時核發之使用執照竣工圖為準。\n五、第一項所列面積與地政機關登記面積有誤差時，買賣雙方應\n依"},{"id":"sec_5","title":"第六條規定互為找補。","content":""},{"id":"sec_6","title":"第五條：共有部分項目、總面積及面積分配比例計算","content":"一、 本房屋共有部分包含梯廳、管委會使用空間、部分車道及地\n下一層、二層、三層，詳如附件（十）附圖所示部份：管道\n間、車道出入口、台電配電場所、機房、緊急發電機室、電\n信機房、消防泵浦機房、防空避難室（兼停車空間）、水箱、\n地下室電樓梯間、管道間、機車停車位、自行車停車位、各\n棟一樓以上電樓梯間、屋頂突出物、屋頂水箱、屋頂電梯機\n房、屋頂消防水箱等其他依法令應列入共有部分之項目。\n二、 本建案共有部分總面積計 18,094.20平方公尺（5,473.50坪）；\n專有部分總面積計 22,249.02 平方公尺（6,730.33 坪）。前\n款共有部分之權利範圍係依買受本戶專有部分面積與全部\n專有部分總面積之比例而為計算，其面積係以本「閱讀台灣」\n共有部分總面積乘以該權利範圍而為計算，該持分登記方式\n仍以地政機關最後登記為準。"},{"id":"sec_7","title":"第六條：房屋面積誤差及其價款找補","content":"一、房屋面積以地政機關登記完竣之面積為準，部分原可依法登\n記之面積，倘因簽約後法令改變，致無法辦理建物所有權第\n一次登記時，其面積應依公寓大廈管理條例"},{"id":"sec_8","title":"第五十六條第三","content":"項之規定計算。\n二、依"},{"id":"sec_9","title":"第四條計算之主建物或本房屋登記總面積如有誤差，其不","content":"足部分賣方均應全部找補；其超過部分，買方只找補百分之\n二為限（至多找補不超過百分之二），且雙方同意面積誤差\n之找補，分別以主建物、附屬建物、共有部分價款除以各面\n積所計算之單價（應扣除車位價款及面積），無息於交屋時\n結算。\n三、前款之主建物或本房屋登記總面積如有誤差超過百分之三\n者，買方得解除契約（土地預定買賣契約書同時解除），因\n面積誤差而解除契約時，賣方應將買方已繳之款項無息全數\n退還，買方不得再請求任何損害賠償。"},{"id":"sec_10","title":"第七條：契約總價","content":"一、本契約總價款\n本房屋買賣總價款\n新台幣 仟 佰 拾 萬元整\n（含車位價款）\n一、房屋價款 新台幣 仟 佰 拾 萬元整\n含\n（一）專有部分 新台幣 仟 佰 拾 萬元整\n營\n1.主建物部分 新台幣 仟 佰 拾 萬元整\n業\n2.附屬建物陽台價款 新台幣 仟 佰 拾 萬元整\n稅\n（二）共有部分 新台幣 仟 佰 拾 萬元整\n二、停車位價款 新台幣 仟 佰 拾 萬元整\n二、上列價款之各期付款方式如附件（一）「付款期別明細表」\n三、第一項價款不包括暫收款之費用。買賣雙方確認上開房屋總\n價為雙方同意買賣本件房屋及停車位之固定總金額。買方同\n意不得以本社區不同戶別之主建物、附屬建物、共有部分及\n停車位等各項拆款價額比例或換算每坪價額之差異而要求\n增減調整房屋總價。\n四、本買賣之價款由承辦登記業務之地政士依法辦理不動產成\n交案件實際資訊申報事宜。"},{"id":"sec_11","title":"第八條：履約擔保機制","content":"本預售屋應辦理履約擔保，履約擔保賣方依下列方式選擇不動產\n開發信託：\n\n▉不動產開發信託\n由賣方或起造人將建案土地及興建資金信託予台中商業銀行\n股份有限公司執行履約管理。興建資金應依工程進度專款專\n用。又簽定本約時，賣方應提供上開信託之證明文件或影本予\n買方。詳附件（十三）信託證明文件。\n□價金返還之保證\n本預售屋由（金融機構）負責承作價金返還保證。價金返還之\n保證費用由賣方負擔。\n賣方應提供第一項之保證契約影本予買方。\n□價金信託\n本預售屋將價金交付信託，由（金融機構）負責承作，設立專\n款專用帳戶，並由受託機構於信託存續期間，按信託契約約定\n辦理工程款交付、繳納各項稅費等資金控管事宜。\n前項信託之受益人為賣方（即建方或合建雙方）而非買方，受\n託人係受託為賣方而非爲買方管理信託財產，但賣方無法依約\n定完工或交屋者，受益權歸屬於買方。\n賣方應提供第一項之信託契約影本予買方。\n□同業連帶擔保\n本公司與依公司章程規定得對外保證之○○公司（同業同級公\n司）等相互連帶擔保，賣方未依約定完工或交屋者，買方可持\n本契約向上列公司請求完成本建案後交屋。上列公司不得為任\n何異議，亦不得要求任何費用或補償。\n前項同業同級分級之基準，由內政部定之。\n賣方應提供連帶擔保之書面影本予買方。\n□公會辦理連帶保證協定\n本預售屋已加入由全國或各縣市不動產開發商業同業公會辦\n\n理之連帶保證協定，賣方未依約定完工或交屋者，買方可持本\n契約向加入本協定之○○公司請求共同完成本建案後交屋。加\n入本協定之○○公司不得為任何異議，亦不得要求任何費用或\n補償。\n賣方應提供加入前項同業聯合連帶保證協定之書面影本予買\n方。"},{"id":"sec_12","title":"第九條：付款條件","content":"一、付款，除簽約款及開工款外，應依已完成之工程進度所定附\n件（一）「付款期別明細表」之規定於工程完工後繳款，其\n每次付款間隔日數應在二十日以上。如賣方未依工程進度定\n付款條件者，買方得於工程全部完工時一次支付之。\n二、買方應於接到賣方繳款通知七天內，由買方開立抬頭為『台\n中商業銀行股份有限公司收款信託專戶』之禁止背書轉讓即\n期支票予賣方或以現金、轉帳或匯款方式直接存入賣方指定\n之信託專戶。\n銀 行：台中商業銀行股份有限公司 桃園分行\n戶 名：台中商業銀行股份有限公司收款信託帳戶\n銀行代號：053\n帳 號：129-22-0005744\n契約編號：110020226\n貴戶之專屬繳款帳號：710-0573-226"},{"id":"sec_13","title":"第十條：逾期付款之處理","content":"一、買方如逾期達五日仍未繳清款項或已繳之票據無法兌現時，\n買方應加付按逾期期款部分每日萬分之二單利計算之遲延\n利息，於補繳期款時一併繳付賣方。\n\n二、如逾期二個月或逾使用執照核發後一個月不繳期款或遲延\n利息，經賣方以存證信函或其他書面催繳，經送達七日內仍\n未繳者，雙方同意依本契約違約之處罰規定辦理。但前項情\n形賣方同意緩期支付者，不在此限。\n三、於前述情形，房屋所有權如已移轉登記為買方名義時，買方\n應將該房屋所有權移轉返還登記予賣方或賣方指定之登記\n名義人，並於賣方通知解約之日起十日內，備齊移轉登記所\n需之文件及用印，其返還登記所需之費用由買方負擔。\n四、本房屋之興建工程倘提早完成者，賣方得逕行通知買方辦理\n銀行對保、辦理產權移轉登記及交屋，買方尚未繳清之自備\n款、尾款等皆須依賣方通知之期間內付清完畢，惟其每次付\n款間隔日數應在二十日以上。\n第 十 一 條：地下層、法定空地、露臺及屋頂等共有部份約定及權屬\n一、地下層停車位\n本契約地下層共三層，總面積 11,753.25 平方公尺（3,555.36\n坪），扣除"},{"id":"sec_14","title":"第三條所列地下層不具獨立權狀之停車空間以外","content":"之共有部分及依法令得為區分所有之標的者，其餘面積\n6,195.01 平方公尺（1,873.99 坪），由賣方依法令以停車位\n應有部分（持分）設定專用使用權予本預售屋承購戶。\n二、法定空地\n本建物法定空地之土地所有權應登記為全體區分所有權人\n共有，並為區分所有權人共用。但部分區分所有權人不需使\n用該共有部分者，得予除外。惟本社區全體區分所有權人同\n意本社區一樓臨 S1 戶、S2 戶、S3 戶、S5 戶、S6戶、S7 戶、\nS8 戶、S9 戶、S10 戶、S11 戶、S12 戶、S13 戶、S17 戶之\n\n法定空地，由毗鄰之各戶於符合法令之規定無償分管約定專\n用。如遇有公共設施或設備（如消防、瓦斯、管道等）依實\n際需要有維護或維修之必要，應無償提供出入，各約定專用\n人同意無條件配合。\n三、露臺\n本社區地上一樓 S1 戶、S2 戶、S3 戶、S5 戶、地上二樓 A3\n戶、B2 戶；地上三樓 S15 戶、A5 戶、A6 戶、B1 戶、B5\n戶、B6 戶、B9 戶；地上四樓 B6 戶及十九樓 A1 戶、A2 戶、\nA3 戶、A5 戶、B1 戶、B2 戶、B3 戶、B5 戶之露台依現行\n法令未能辦理產權登記，買方暨本社區全體區分所有權人清\n楚知悉並同意由毗鄰之各戶管理維護使用。管理使用人應依\n賣方之區隔範圍管理使用，並且不得對露台、平台有變更構\n造、外觀、使用目的、裝設鐵窗或類似之行為。如遇有公共\n設施或設備（如消防、瓦斯、管道等）依實際需要有維護或\n維修之必要，應無償提供出入，各約定專用人同意無條件配\n合。\n四、屋頂平台及突出物\n共有部分之屋頂突出物及屋頂避難平台，不得為約定專用部\n分，除法令另有規定外，不得作為其他使用，買方暨本社區\n全部區分所有權人或繼受人，應依使用執照竣工圖管理維護\n使用。\n五、法定空地、露臺、非屬避難之屋頂平台，如有約定專用部分，\n應於社區管理規約草約訂定之。\n【買方簽章： 】\n\n第 十 二 條：建材設備及其廠牌、規格與施工規範\n一、施工標準悉依核准之工程圖樣與說明書及本契約附件（二）\n之建材及設備說明書施工，除經買方同意，不得以同級品之\n名義變更建材設備或以附件所列舉品牌以外之產品替代，但\n賣方能證明有不可歸責於賣方之事由，致無法供應原建材設\n備，且所更換之建材設備之價值、效用及品質不低於原約定\n之建材設備或補償價金者，不在此限。又賣方於預售期間展\n示之接待會館、樣品屋裝潢傢俱等，除建材設備表所列建材\n設備外，均不含於本契約之給付範圍內，僅供買方日後自行\n裝潢參考之用，買方不得據此請求賣方給付之或主張任何權\n利。\n二、賣方建造本預售屋不得使用有損建築結構安全或有害人體\n安全健康之輻射鋼筋、石棉、電弧爐煉鋼爐碴（石）、未經\n處理之海砂等材料或其他類似物。\n三、前項材料之檢測，應符合檢測時中華民國國家標準或主管機\n關所定之檢測規範，如有造成買方生命、身體、健康及財產\n之損害者，仍應依法負責。\n四、賣方如有違反前三項之情形，雙方同意依違約之處罰規定處\n理。\n五、本社區施工標準悉依新北市政府城鄉局核准之建造執照、工\n程圖說及本契約之建材設備表等有關規定施工，並以主管機\n關核發使用執照之竣工圖為合格標準。\n六、本社區所需之供水、供電、電信、瓦斯、消防及污廢水等設\n備及管線舖設位置，買方同意依照政府機關核發建築圖說之\n標示位置。\n七、前項管線配管或接通依管線事業單位規定之作業程序施作，\n買方同意其接通供應時間悉依管線單位之作業決定。\n\n第 十 三 條：開工及取得使用執照期限\n一、本社區之建築工程在民國 110 年 10 月 15 日申報開工，於\n115 年 12 月 18 日前完成主建物、附屬建物及使用執照所定\n之必要設施，雙方同意以建築主管機關核發之使用執照為本\n社區工程完工日期之認定依據及標準，如賣方提前完工，買\n方絕無異議，仍依「付款期別明細表」按期繳納。但有下列\n情事之一者，得順延其期間：\n（一）因天災地變等不可抗力之事由，致賣方不能施工者，\n其停工期間。\n（二）因政府法令變更或其他非可歸責於賣方之事由發生\n時，其影響期間。\n二、賣方如逾前項期限未開工或未取得使用執照者，每逾一日應\n按已繳房地價款依萬分之五單利計算遲延利息予買方。若逾\n期三個月仍未開工或未取得使用執照，視同賣方違約，雙方\n同意依違約之處罰規定處理。\n三、買方同意委託賣方統一代向瓦斯公司申請天然瓦斯，除非瓦\n斯公司無法受理。瓦斯管線之申請、設計、施工裝置、保證\n金等費用由賣方負擔，瓦斯錶於交屋後由買方自行申請，費\n用自行負擔。\n第 十 四 條：工程、建材修改保留權及買方辦理室內變更設計\n一、地下室之汽車停車位位置及編號，若因法令變更或主管機關\n要求而需調整，買方同意於不影響買方所購買停車位之權益\n下，賣方得依實際使用情形變更汽車停車位位置及編號。\n二、買方如擬辦理室內變更設計原則如下：\n（一）變更條件：本社區已完成之樓層底版尚未達買方所購\n買之樓層且二者差距達五個樓層以上時，買方得依本\n\n契約及客戶變更通知單申請室內工程變更。\n（二）買方申請變更設計之範圍以室內隔間及裝修為限，其\n他有關建築主要結構、專有戶之給排水空間、剪力牆、\n大樓立面外觀、污水管線、管道間、消防設施、公共\n設施等不得要求變更。\n（三）買方若要求室內隔間或裝修變更時，應於簽定本契約\n七日內向賣方提出申請（須符合本條第二項第一款之\n變更條件），並於賣方所提供之工程變更單上簽認為\n準，且此項變更之要求以一次為限。辦理變更時，買\n方需親自簽認，並附詳圖配合本工程辦理之，且不得\n有違反建管法令之規定。\n（四）工程變更事項經雙方於工程變更單上簽認後，由賣方\n提出追加減帳，以書面通知買方簽認。工程變更如為\n追加帳，買方應於追加減帳簽認日起十日內繳清工程\n追加款始為有效，若未如期提出書面申請並確認完成\n及未繳清追加款，視同買方無條件取消工程變更要\n求，賣方得拒絕受理並按原設計施工。工程變更若為\n追減帳，則於交屋時一次結清。雙方無法簽認時，則\n依原設計施工。\n（五）買方自行施作室內裝修時，應俟辦妥交屋手續並繳清\n所有應繳納款項後始得進行裝修工程，但不得破壞建\n築結構、大樓立面外觀、管道間、污水管線、消防設\n施、公共設施等。\n（六）若買方承購兩戶以上因自身需求欲合併作為一戶使\n用，賣方不配合辦理建築執照變更設計，即對於原規\n劃設計之各戶大門及梯廳防火門、門牌、天然氣管路、\n\n水錶、電錶、室內配電盤及消防管路等設備，仍維持\n原狀。另隔戶牆之拆除（若有設計剪力牆則不得拆\n除），因與原規劃圖說不符且違反建築相關法規，買\n方若欲拆除，應於辦理完成交屋手續後，依建築法規\n等相關規定自行處理，並自負責任，與賣方無涉。\n（七）買方於交屋後若自行裝修時，應考量安全載重，室內\n隔間部分須採輕質隔間方式施做，並為避免施做地磚\n或石材用水造成下層居室滲水，全室地坪須施作防\n水，並注意避免損及室內結構或外牆，以維護建物安\n全。\n（八）為免買方申請工程變更後違約不買造成賣方損失擴\n大，買方如有任一期款逾期五日以上，經賣方限期催\n告繳款仍未遵期繳款者，賣方得取消工程變更，買方\n不得有異議。\n（九）若買方違約退戶時，其申請之工程變更若已變更之部\n份，須回復原狀（格局、建材設備及管線），其所需\n之費用由買方支付。如買方未回復原狀，賣方得代為\n回復，回復原狀所需之款項，將由退還款項中優先扣\n除所需費用，買方不得有異議。\n第 十 五 條：驗收\n一、賣方依約完成本戶一切主建物、附屬建物之設備及領得使用\n執照並接通自來水、電力、於有天然瓦斯地區，並應達成瓦\n斯配管之可接通狀態及完成契約、廣告圖說所示之設施後，\n應通知買方進行驗收手續。\n二、買方應按賣方通知之時間辦理驗收手續。雙方驗收時，賣方\n應提供房屋驗收單，如發現房屋有瑕疵，應載明於驗收單上，\n\n由賣方限期（或視修繕項目於合理期間內）完成修繕；買方\n並有權於自備款部分保留房地總價百分之五作為交屋保留\n款，於完成修繕並經雙方複驗合格後支付。\n三、第一項接通自來水、電力之管線費及其相關費用（例如安裝\n配置設計費、施工費、道路開挖費、復原費及施工人員薪資\n等）由賣方負擔；達成天然瓦斯配管之可接通狀態之約定，\n除契約另有約定，並於相關銷售文件上特別標明不予配設\n外，其管線費及相關費用依下列方式處理：\n（一）預售屋基地範圍內之天然瓦斯配管，由賣方負擔。\n（二）預售屋基地範圍外銜接公用事業外管線之天然瓦斯\n配管，雙方議定由 方負擔。\n四、驗屋時未於驗收單上列舉改善之事項，如有修繕必要，買方\n應依保固維修程序辦理，不得作為拒絕交屋之理由。\n五、賣方或本案任何一戶因修繕需經由買方房屋內、外修繕時，\n買方同意賣方或該戶派員進行修繕，但買方因此項修繕所受\n損害之部分，應向賣方或該戶請求修復或賠償。\n六、驗屋標準：各戶建材（如地面、飾材、門窗框扇等），若有\n表面瑕疵於不影響日常使用時，買方同意賣方以專業美容方\n式處理。\n第 十 六 條：房屋所有權移轉登記\n一、房屋所有權之移轉，應於使用執照核發後四個月內備妥文件\n申辦有關稅費及權利移轉登記。\n二、賣方違反前項之規定，致各項稅費增加或罰鍰（滯納金）時，\n賣方應全數負擔；如損及買方權益時，賣方應負損害賠償之\n責。\n三、賣方應於買方履行下列義務時，辦理房屋所有權移轉登記：\n\n（一）依契約約定之付款辦法，除約定之交屋保留款外，應\n繳清房屋所有權移轉登記前應繳之款項及逾期加付\n之遲延利息。\n（二）提出辦理所有權移轉登記及貸款有關文件，辦理各項\n貸款手續，繳清各項稅費，預立各項取款或委託撥付\n文件，並應開立受款人為賣方及票面上註明禁止背書\n轉讓，及記載擔保之債權金額及範圍之本票予賣方。\n（三）本項第一款、第二款之費用如以票據支付，應在登記\n以前全部兌現。\n四、本條第一項之辦理事項及貸款之相關抵押權設定，由賣方指\n定之地政士統一辦理之。買方應依賣方通知之期限內提供上\n述事項所需證件、印章及繳清各項稅費，買方如有辦理貸款，\n並應辦妥貸款相關手續，預立各項取款條或委託撥付文件或\n撥款同意書等文件手續，前開文件一經書立後，非經買方、\n賣方及銀行三方面之同意，不得撤銷本項委託或同意，並開\n立與本契約貸款金額同額之商業本票予賣方；但買方如未辦\n理貸款，仍應於賣方通知之期限內，開立附件（一）「付款\n期別明細表」銀行貸款之同額商業本票予賣方。倘為配合各\n項手續需要，需由買方加蓋印章、出具證件或繳納各項稅費\n時，買方接獲賣方或承辦地政士通知日起七日內提供，如有\n逾期，每逾一日應按房地總價款依萬分之二單利計算遲延利\n息予賣方，另如因買方之延誤或不協辦，致各項稅費增加或\n罰鍰（滯納金）時，買方應全數負擔；如損及賣方權益時，\n買方應負全部損害賠償之責。\n五、買方同意簽立「代刻印章委託書」乙份，委託賣方代刻印章\n乙枚並負責保管，有關買方授權內容詳如附件（三）所示。\n\n六、買方為未成年者，買方應於產權移轉前配合賣方或其指定地\n政士完成稅捐主管機關規定之贈與稅之申報、完稅程序。\n七、買方如未於賣方通知期限內履行本條約定，賣方得不辦理房\n屋所有權移轉登記。\n八、無其他違約事由，但若無理由或以不成立之理由透過口頭、\n書面或其他任何方式拒絕給付（包含但不限於拒絕撥付銀行\n貸款或其他款項，抑或是履行本條第三項之義務但又於產權\n過戶前表明拒絕過戶產權等等）者，賣方得停止或撤銷房地\n產權過戶手續。\n九、依公寓大廈管理條例"},{"id":"sec_15","title":"第四條之規定，買方不得要求所購買之","content":"房屋及其基地持分，分別移轉不同之所有權人。\n第 十 七 條：通知交屋期限\n一、賣方應於領得使用執照之日起六個月內，通知買方進行交\n屋。於交屋時雙方應履行下列各款義務：\n（一）賣方付清因延遲完工所應付之遲延利息於買方。\n（二）賣方就契約約定之房屋瑕疵或未盡事宜，應於交屋前\n完成修繕。\n（三）買方繳清所有之應付未付款（含交屋保留款）及完成\n一切交屋手續。\n（四）賣方如未於領得使用執照六個月內通知買方進行交\n屋，每逾一日應按已繳房地價款依萬分之五單利計算\n遲延利息予買方。如買方要求提前交屋，應於交屋同\n時支付交屋保留款，於產權移轉完成及貸款撥付後七\n日內進行交屋結算。\n二、買方應預繳六個月社區管理費，此費用係為管委會未成立前\n買方同意由賣方委託專業管理公司代為擔任管理維護工作，\n\n其管理期間為每戶通知交屋日起至管委會成立止，代管期間\n之社區公共水電、公共維護費用、安全、警衛管理薪資、清\n潔衛生費用、電梯保養與設備維護及耗材費用等一切公共費\n用，由全體用戶分攤，並於交屋時由預繳之社區管理費抵扣\n繳付。並於管委會成立時與管委會結算後無息移交管委會統\n籌運用，若不足支付此費用時，由管委會成立後再支付於賣\n方。\n三、買方應於裝修時向管委會或賣方申請裝修許可，並預繳裝潢\n保證金新台幣三萬元整以擔保買方房屋裝潢後清除廢棄物\n之責任及維持社區無任何損害。買方履行完畢上開擔保義\n務，經管委會或賣方認可後，其保證金無息退還買方。\n四、本社區於建造竣工，於買方繳清各期款項、代辦之各項費用\n及逾期付款之滯納金與完成金融機構貸款手續，且將貸款金\n額撥交賣方，並全部履行各款項支付義務後，買方始得請求\n交屋，賣方應於買方辦妥交屋手續後，將土地及建物所有權\n狀、房屋保固服務卡、規約草約、使用執照（若數戶同一張\n使用執照，則日後移交管理委員會）或使用執照影本及賣方\n代繳稅費之收據交付買方，俾憑換取鑰匙，本契約則無需返\n還。\n五、買方應於收到交屋通知日起 日內配合辦理交屋手續，賣\n方不負保管責任。若為委託他人代辦，應出具委託授權書予\n賣方。\n六、買方同意於通知之交屋日起三十日後，不論已否遷入，即應\n負擔本戶水電費、瓦斯基本費，公共水電費及清潔管理費、\n公共維護費用、社區管理費等。另瓦斯裝錶費用及保證金亦\n由買方負擔。\n\n七、買方於完成交屋前不得使用本契約房屋或進行裝修，若買方\n於履行本契約各項義務後，完成交屋前欲接管使用本契約房\n屋，視為買方同意依現狀點收本契約房屋，並自點交時起承\n受負擔本契約房地之利益及風險，並遵守大樓、工地之管理\n相關規定及繳交各項費用。\n八、本社區共有使用部分之相關公共設施，賣方得於第一批通知\n交屋日起六個月內全部完成，依據公寓大廈管理條例第三十\n六條十一項及"},{"id":"sec_16","title":"第五十七條之規定，應由社區管理委員會或推","content":"選管理負責人點交及接管，買方不得以公共設施未完成或未\n點交為由拒絕辦理交屋手續。\n第 十 八 條：共有部分之點交\n一、賣方應擔任本預售屋共有部分管理人，並於成立管理委員會\n或推選管理負責人後移交之。雙方同意自交屋日起，由買方\n按月繳付共有部分管理費、水電費等一切公共費用。買方同\n意賣方得於管委會成立前委託管理公司負責本社區共同使\n用部分之使用、管理及清潔維護等諸事宜。\n二、賣方於完成管理委員會或推選管理負責人後七日內，應會同\n管理委員會或推選管理負責人現場針對水電、機械設施、消\n防設施及各類管線進行檢測，確認其功能正常無誤後，將共\n用部分、約定共用部分與其附屬設施設備；設施設備使用維\n護手冊及廠商資料、使用執照謄本、竣工圖說、水電、機械\n設施、消防及管線圖說等資料，移交之。上開檢測責任由賣\n方負責，檢測方式，由賣方及管理委員會或管理負責人，雙\n方協議為之，賣方並通知政府主管機關派員會同見證雙方已\n否移交。\n三、賣方應於第一批通知交屋日起六個月內召開第一次區分所\n有權人會議與協助本社區成立第一屆管理委員會，買方應按\n\n賣方通知之時間、地點親自或書面委託他人代理出席區分所\n有權人會議。\n四、買方同意於成立管理委員會或推選管理負責人後七日內，應\n由賣方會同管理委員會或推選管理負責人檢視點交共同使\n用部分及附屬設施設備等公共設施，並進行機具設備之操作\n測試，檢測點交項目資料由賣方準備。該公共設施並於管理\n委員會成立後或推選管理負責人後十五日內負責接收，逾期\n未接收者，視為已接收，另自第一批通知交屋日起六個月內\n未成立管理委員會或推選管理負責人致未能接收者，視為已\n由全體區分所有權人接收公共設施。\n五、第一屆管理委員會之職權，除依附件（七）「社區管理規約」\n之約定，並應執行下列事項：\n（一）賣方與管理顧問公司之權利義務關係，由管理委員會\n代表全體區分所有權人予以繼受。\n（二）管理委員會成立一個月內，自管理顧問公司完成接收\n公共設施，並與之結算管理費用之收支。\n（三）賣方代刻管理委員會之大小章由專業社區管理維護\n公司向地方主管機關申請成立報備及公用水、電、電\n信之登記名義變更。\n六、賣方應依「公寓大廈管理條例施行細則」"},{"id":"sec_17","title":"第五條之規定，依","content":"法提撥公共基金，於申請使用執照時，匯入建管單位指定之\n公庫專戶。待管理委員會依法成立，並開設金融機構或郵局\n帳戶及完成共同使用部分及附屬設備之點交後，由公庫依法\n律規定撥付新台幣 4,000,029 元整予本社區管理委員會。\n七、本社區住家入口大廳及公共服務空間等設施，賣方得為銷售\n之目的無償優先使用之。惟賣方亦應於銷售目的完成後，回\n復原狀歸還之。\n\n第 十 九 條：保固期限及範圍\n一、本契約房屋自買方完成交屋日起，或如有可歸責於買方之原\n因時自賣方通知交屋日起，除賣方能證明可歸責於買方或不\n可抗力因素外，就結構部分（基礎、主要樑柱、承重牆壁、\n樓地版、屋頂、樓梯、擋土牆、雜項工作物涉及結構部分…\n等）負責保固十五年，廚具櫃體保固二十年及施作防水範圍\n（外牆層接縫、外牆窗框四周、廁所、陽台地坪、露台地坪，\n屋頂板）自使用執照取得日起算保固十年，固定建材及設備\n部分（如：門窗、衛浴、廚具、磁磚、地磚、粉刷、管線及\n機電設備等）自買方完成交屋日起（含視為點收完成）負責\n保固一年，賣方並應於交屋時出具房屋保固服務紀錄卡予買\n方作為憑證。\n二、前項期限經過後，買方仍得依民法及其他法律主張權利。\n三、若因買方使用、維護不當或裝潢破壞（例如：擅自更改結構、\n自行增建、外牆或樓板開口、自行更改隔間、裝潢施工破壞、\n修改火警感知器及消防灑水頭等）、因不可抗力（例如：戰\n爭、水患、地震、天災或自然耗損等）、設備所需耗材及必\n要之例行性保養責任，賣方不負前項保固及任何法律責任。\n四、社區共同使用部分及公共設施自賣方點交（含視為點交完\n成）予社區管理委員會日起負保固責任，結構部分保固十五\n年，固定建材及設備部分（如機電設備、消防設備、門窗、\n粉刷、地磚及水電）保固一年；但若社區管理委員會遲未成\n立、未選任管理負責人或遲不點交時，賣方於使用執照取得\n日起六個月後開始起算此部分之保固責任。\n五、保固期間應負擔之保養、維護費用（如添加油料，更換消耗\n性材料等）應由買方自行負擔（共有部分及公共設施由社區\n\n住戶以管理費共同負擔），非在此保固範圍內。\n六、保固期限內買方未經賣方同意，另雇他人保固服務修繕時，\n不得向賣方請求費用補償。\n第 二 十 條：貸款約定\n一、委辦貸款：\n本約"},{"id":"sec_18","title":"第七條契約總價內之部分價款新臺幣仟佰","content":"拾 萬元整，由買方與賣方洽定之金融機構之貸款給付，\n買方應簽立「委辦貸款委託書」如附件（四），由買賣雙方\n依約定辦妥一切貸款手續。惟買方可得較低利率或有利於買\n方之貸款條件時，買方有權變更貸款之金融機構，自行辦理\n貸款，除享有政府所舉辦之優惠貸款利率外，買方應於賣方\n通知辦理貸款日起二十日內辦妥對保手續，並由承貸金融機\n構同意將約定貸款金額撥付賣方。委辦貸款應遵守事項如\n下：\n（一） 買方同意以本戶房屋產權提供擔保，設定第一順位\n抵押權予賣方提供之金融機構辦理貸款，並於該金融\n機構對保及開戶時預立經簽章之取款條（取款條、存\n摺簿及取款密碼）及委託直接撥款同意書撥款委託\n書）予賣方以憑辦理，且未經雙方及該金融機構三方\n同意不得撤銷該委託直接撥款同意書。買方同時開立\n與貸款同額之擔保本票一紙予賣方，賣方於收到貸款\n後應返還買方。\n（二）買方同意於賣方通知對保日起算四十五日內完成該\n金融機構辦理貸款之撥款。\n（三）買方辦理金融機構貸款但減少貸款金額者，不足抵付\n本約附件（一）「付款期別明細表」房屋貸款時，該\n\n不足部分價款應依照本約附件（一）「付款期別明細\n表」如期先行給付房屋貸款。買方同意於賣方通知日\n起七日內，買方以現金一次匯入賣方指定之帳戶內。\n若買方未付清該價款前，賣方得拒絕辦理產權移轉登\n記予買方。\n（四）買方若因辦理貸款之條件不合，或已持有第二戶（含）\n以上之房屋者；或中途改變主意不貸款；或未依通知\n期限辦妥一切貸款手續；或主動向金融機構表明拒絕\n貸款、暫緩撥款、附帶任何條件或附帶期限撥款；或\n因買方之任何因素使賣方無法如期取得全部貸款者，\n視為買方不辦理貸款，依本條第三項辦理。\n（五）本條款所提供之金融機構係願配合本案辦理貸款作\n業，買方仍應自行向該金融機構洽詢相關規定，並同\n意金融機構之業務行為不得歸責於賣方。\n二、 自洽貸款：\n前項預定辦理貸款之價款，買方若欲自洽金融機構辦理貸款\n以資抵付本約之房屋貸款者，買方應告知賣方擬自洽貸款之\n特定金融機構，並配合賣方辦理債權確保手續，應簽立附件\n（五）「自洽貸款協議書」，並遵守下列事項：\n（一） 買方同意以本戶房屋產權供擔保，設定第一順位抵押\n權予其自洽金融機構辦理貸款，並於抵押權設定前預\n立經簽章之取款條（取款條、存摺簿及取款密碼）及\n委託直接撥款同意書（撥款委託書）予賣方以憑辦理，\n且未經雙方及該自洽金融機構三方同意不得撤銷該委\n託直接撥款同意書。買方同時開立與貸款同額之擔保\n本票一紙予賣方，賣方於收到貸款後應返還買方。\n\n（二） 買方辦理金融機構貸款但減少貸款金額者，不足抵付\n本約附件（一）「付款期別明細表」房屋貸款時，該不\n足部分價款應依照本約附件（一）「付款期別明細表」\n如期先行給付房屋貸款。買方同意於賣方通知日起七\n日內，買方以現金一次匯入賣方指定之帳戶內。若買\n方未付清該價款前，賣方得拒絕辦理產權移轉登記予\n買方。\n（三） 買方自洽金融機構辦理貸款（包括第一次購屋貸款、\n公教貸款、勞工貸款或其他優惠貸款）者，除應自行\n向該金融機構瞭解貸款條件（貸款人身份、擔保物使\n用用途、貸款金額），並同意金融機構之業務行為不\n得歸責於賣方。\n（四） 買方同意相關抵押權設定手續由賣方指定之地政士統\n籌辦理。\n三、不辦理貸款：\n買方不辦理金融機構貸款者，該部分價款應依照附件（一）\n「付款期別明細表」如期如數給付賣方。買方於接獲賣方書\n面掛號繳款通知單七日內（依郵局第一次投遞日期為通知\n日）如期如數給付賣方，以現金匯入賣方指定帳戶內，一次\n繳清銀行貸款之金額，以為給付。由賣方指定之地政士辦理\n有關稅費申報。若買方未付清本期價款前，賣方得拒絕辦理\n產權移轉登記予買方，並依本約"},{"id":"sec_19","title":"第十條約定處理。","content":"四、第一項由賣方洽定辦理之貸款金額少於預定貸款金額，其差\n額依下列各款處理：\n（一）不可歸責於雙方時之處理方式如下：\n1、差額在預定貸款金額百分之三十以內者，賣方同\n意以原承諾貸款相同年限及條件由買方分期清\n償。\n\n2、差額超過原預定貸款金額百分之三十者，賣方同\n意依原承諾貸款金額之利率計算利息，縮短償還\n期限為 年（期間不得少於七年），由買方按\n月分期攤還。\n3、差額超過原預定貸款金額百分之三十者，買賣雙\n方得選擇前述方式辦理或解除契約。\n（二）可歸責於賣方時，差額部分，賣方應依原承諾貸款相\n同年限及條件由買方分期清償。如賣方不能補足不足\n額部分，買方有權解除契約。\n（三）可歸責於買方時，買方應於接獲通知之日起 天\n（不得少於三十天）內一次給付其差額或經賣方同意\n分期給付其差額。\n五、買方充分認知預定貸款金額係為本契約應繳總價之一部分，\n屬賣方應收之價款，並非交屋保留款及尾款，買方同意於金\n融機構貸款核准後及於賣方完成產權移轉至買方名下之給\n付義務時，買方之對待給付義務即為支付預定貸款金額，由\n金融機構當日撥入賣方指定之金融機構帳戶，以資抵付預定\n貸款金額。\n六、有關金融機構核撥貸款後之利息，由買方負擔。但於賣方通\n知之交屋日前之利息應由賣方返還買方。"},{"id":"sec_20","title":"第二十一條：貸款撥付","content":"本契約有貸款約定者，於產權登記完竣並由金融機構設定抵押權\n後，除有違反"},{"id":"sec_21","title":"第十二條第二項、第三項或其他縱經修繕仍無法達","content":"到應有使用功能之重大瑕疵外，買方不得通知金融機構終止撥付\n貸款金額予賣方。"},{"id":"sec_22","title":"第二十二條：房屋轉讓條件","content":"一、 自本契約簽定日起買方即為產權登記名義人，倘買方為未成\n年人，其法定代理人對買方依本契約所應負擔之一切義務願\n負連帶保證人之責任。\n二、 買方繳清已屆滿之各期應繳款項者，於本契約房地所有權移\n轉登記完成前，如欲將本契約轉讓他人時，必須事先依主管\n機關規定辦理。\n三、買方於簽約後，不得將本契約讓與或轉售與第三人。但配偶、\n直系血親或二親等內旁系血親間之讓與或轉售；或其他中央\n主管機關公告得讓與或轉售之情形並經直轄市、縣（市）主\n管機關核准者，不在此限。\n四、符合前款但書規定之買方，應繳清已屆滿之各期應繳款項，\n並以書面通知賣方，賣方除有法令依據外，不得拒絕配合辦\n理。\n五、前款情形，除第三款但書之受讓人為買方之配偶、直系血親\n或二親等內旁系血親，免手續費外，賣方得向買方收取本契\n約房地總價款萬分之_____（最高以萬分之五為限）之手續\n費。"},{"id":"sec_23","title":"第二十三條：房屋稅之分攤比例","content":"房屋稅以賣方通知書所載之交屋日為準。該日期前由賣方負擔，\n該日期後由買方負擔，並依法定稅率及年度月份比例分算稅額。"},{"id":"sec_24","title":"第二十四條：稅費負擔之約定","content":"一、房屋產權移轉及貸款抵押設定登記之登記規費、契稅、印花\n稅、代辦手續費、代書費及各項規費、實價登錄、貸款保險\n費及各項附加稅捐由買方負擔。但起造人為賣方時，建物所\n\n有權第一次登記規費及代辦手續費由賣方負擔。\n二、公證費由雙方各負擔二分之一。但另有約定者從其約定。\n三、本條所列買方應繳之各項稅費（所有權移轉登記規費、印花\n稅、代辦手續費、貸款保險費及各項附加稅捐等），無論該\n單據抬頭為何人，均應由買方負擔。\n四、買方應於通知銀貸對保及用印時將前項等費用及預收款項\nA2 戶、A3 戶、A7 戶、A8 戶、B2 戶、B3 戶、B7 戶、B8\n戶二樓至十八樓新台幣貳拾參萬元，A1 戶、A5 戶、A6 戶、\nA9 戶、B1 戶、B5 戶、B6 戶、B9 戶二樓至十八樓新台幣貳\n拾柒萬元，A1 戶、A2 戶、A3 戶、A5 戶、B1 戶、B2 戶、\nB3 戶、B5 戶十九樓新台幣肆拾參萬元交由賣方統一代繳，\n待買方辦理正式交屋手續時結清，雙方同意多退少補，並由\n買方領回相關正式單據。買方明確知悉該費用不包含於本契\n約所列之買賣總價款。如買方未依限繳納買賣價金或預付款\n項致各項稅費增加或致生滯納金時，其增加部分無論徵納義\n務人名義為何，均由買方負擔。"},{"id":"sec_25","title":"第二十五條：公共管理及使用分管約定","content":"一、為維持良好秩序及公共安寧，確保全體用戶之共同權益，買\n方應遵守社區管理規約詳如附件（七）之規定，有關遵守規\n定事宜，由賣方或賣方指定之人召集全部所有區分所有權人\n成立管理委員會執行管理，管理委員會未成立以前買方同意\n由賣方或賣方委託專業管理公司代為擔任管理維護工作，其\n管理期間訂為本社區第一戶通知交屋日起至管理委員會成\n立止，代為管理期間所需之社區公共水電、公共維護費用、\n安全、清潔衛生費用、警衛保全、物業管理、電梯保養與設\n備維護及耗材費用等一切公共費用，買方同意由全體區分所\n\n有權人以預繳之社區管理費分攤繳付之。\n二、為維護各社區之公共秩序安寧，清潔衛生及所有共同使用部\n分之經營管理，買方同意依照社區管理規約詳如附件（七）\n之規定辦理。依公寓大廈管理條例之規定，規約草約於區分\n所有權人會議決議通過（或修改通過）前，視為社區之管理\n規約，買方應依照所簽立之規約草約行使權利及履行義務。\n區分所有權人會議決議通過（或修改通過）管理規約後，買\n方即應依該通過之管理規約行使權利或履行義務。買方之權\n利義務若因規約修改而與規約草約不同者，與賣方無涉。\n三、本社區開放空間及告示牌、共有部份之屋頂突出物及屋頂平\n台，不得為約定專用部分，除法規另有規定外，不得作為其\n他使用，並由管委會管理維護。\n四、本社區一樓臨 S1 戶、S2 戶、S3 戶、S5 戶、S6 戶、S7 戶、\nS8 戶、S9 戶、S10 戶、S11 戶、S12 戶、S13 戶、S17 戶之\n法定空地，本社區地上一樓 S1 戶、S2 戶、S3 戶、S5 戶、\n地上二樓 A3 戶、B2 戶；地上三樓 S15 戶、A5 戶、A6 戶、\nB1 戶、B5 戶、B6 戶、B9 戶；地上四樓 B6 戶及十九樓 A1\n戶、A2 戶、A3 戶、A5 戶、B1 戶、B2 戶、B3 戶、B5 戶之\n露台，依法不予辦理產權登記，買方暨本社區全體區分所有\n權人清楚知悉並同意由毗鄰之各戶無償分管約定專用。該約\n定專用使用權人應符合法令規範管理使用，且需符合管委會\n之相關規定使用，不得妨礙他人避難逃生，如遇有公共設施\n或設備（如供水、供電、電信、消防、瓦斯、管道間等）依\n實際需要有維護或維修之必要，或於清洗外牆或抄錄水錶度\n數等作業時，應無償提供出入及架設設備，各約定專用使用\n權人同意無條件配合。\n\n五、本房屋共有部分包含梯廳、管委會使用空間、部分車道及地\n下一層、二層、三層之管道間、車道出入口、台電配電場所、\n機房、緊急發電機室、電信機房、消防泵浦機房、防空避難\n室（兼停車空間）、水箱、地下室電樓梯間、管道間、機車\n停車位、自行車停車位、各棟一樓以上電樓梯間、屋頂突出\n物、屋頂水箱、屋頂電梯機房、屋頂消防水箱及其他依法令\n應列入共有部分之項目，供全體住戶共有使用，由管委會管\n理維護之。\n六、本建物屋頂裝飾物或外牆，起造人得設置公司名稱、社區標\n誌等，並由本建物管委會統籌管理及維護修繕。\n七、賣方無償提供景觀植栽及附屬設施設備等公共設施部分，此\n部分因屬賣方增設贈送，買方全體同意就上開公共空間所規\n劃設置之設施及植栽美化，以現場完成之現況點交予管理委\n員會或管理負責人接管，交屋後由社區管委會自行負責處\n理，買方及管委會同意日後不得透過管委會決議變更使用方\n式，或向賣方提出任何重作、改良、拆除、替換之主張。\n八、本社區地下層依法設置之機車停車位區、自行車停車位區、\n社區使用停車位及資源回收車停放車位屬於社區公共區域，\n買方同意由本社區管理委員會制定規章管理使用之。\n九、為維護本社區整體外觀整齊與本社區價值、提升社區素質並\n使各戶能有效運用其室內空間，買方同意維持外觀統一，遵\n守外牆、露台各窗戶、欄杆口不另加設雨遮、鐵窗等破壞外\n觀之設施。若違反規定，買方同意賣方代聘之管理公司制止\n或依法報請拆除，不得異議。各戶空調之室外機及熱水器統\n一按賣方規劃之位置予以裝置，不可放置於其他位置，買方\n並同意日後不透過管委會決議變更使用方式或設置之位置。\n\n十、本社區外觀燈光規劃及景觀設置，是維護大樓整體價值及外\n觀之精緻格調，買方同意上述規劃均依照賣方建議之方案統\n籌開關管控執行，買方不得以任何理由拒絕繳納相關公共電\n費或取消燈光計畫。\n十一、買方（即區分所有權人）本條約定視為所有人對共有部分\n之分管特約，依本共有分管之性質，買賣雙方各所有人縱\n將其應有部分讓與第三人或其他權利人（含承租人、借用\n人），本分管特約對其繼續生效，任何出讓人應告知受讓\n人本分管特約之簽訂及效力，如有違反產生糾紛或損害，\n該出讓人應負責解決，否則應負損害賠償責任；受讓人如\n以善意或不知情對抗本分管特約，其主張無效。本條分管\n特約買方同意無條件將之納入社區規約附件（七）「社區\n管理規約」，若有反對致他人權益受損者，願負損害賠償\n責任，非經相關權利人之同意，若有透過修改社區規約（含\n規約草約）或以區分所有權人大會決議之方式變更本分管\n特約者，其修改或變更視為權利濫用無效，並須對權益受\n損者負賠償責任。\n十二、買方同意本契約有關共有部份及公共事項之使用管理約\n定，並簽立『分管協議書』詳如附件（六），視同為區分\n所有權人相互間對於共有部分及公共事項之使用管理之\n特約；為保持良好秩序及全體住戶之公共權益，買方願遵\n守本契約有關管理約定及社區管理規約詳如附件（七）之\n約束。上述約定效力及於買賣雙方權利義務之繼受人或承\n租人等，買方應明確告知之。"},{"id":"sec_26","title":"第二十六條：買賣權益特約條款","content":"一、買方為辦理本契約房屋、土地產權登記及一切本契約相關手\n\n續，同意賣方代刻印章申辦，並簽立「代刻印章委託書」詳\n如附件（三）。\n二、本契約之一切規定對雙方權利義務之受讓人、繼承人或管理\n人、受贈人具同等約束力，且不得以各方或前手間之原因作\n為抗辯之事由；如買方為未成年人，應由其法定代理人簽約\n或由其法定代理人出具書面同意予賣方後始得簽約，其法定\n代理人對買方依本契約所載之一切義務負連帶責任（適用民\n法連帶責任之規定）。"},{"id":"sec_27","title":"第二十七條：賣方之瑕疵擔保責任","content":"一、賣方保證產權清楚，絕無一物數賣、無權占有他人土地、承\n攬人依民法"},{"id":"sec_28","title":"第五百十三條行使法定抵押權或設定他項權利","content":"等情事之一；如有上述情形，賣方應於本戶交屋日或其他約\n定之期日 日前負責排除塗銷之。本契約有利買方者，從\n其約定之。\n二、有關本契約標的物之瑕疵擔保責任，悉依民法及其他有關法\n令規定辦理。"},{"id":"sec_29","title":"第二十八條：違約罰則","content":"一、賣方違反「建材設備及其廠牌、規格」、「開工及取得使用\n執照期限」者，買方得解除本契約。\n二、賣方違反「賣方之瑕疵擔保責任」之規定者，即為賣方違約，\n買方得依法解除契約。\n三、買方依第一項或第二項解除契約時，賣方除應將買方已繳之\n房地價款退還予買方，如有遲延利息應一併退還，並應同時\n賠償房地買賣總價款百分之 （不得低於百分之十\n五）之違約金。但該賠償之金額超過買方已繳價款者，則以\n\n買方已繳價款為限。\n四、買方違反有關「付款條件及方式」之規定者，賣方得沒收依\n房地買賣總價款百分之 （最高不得超過百分之十\n五）計算之金額。但該沒收之金額超過已繳價款者，則以已\n繳價款為限，買賣雙方並得解除本契約。\n五、買賣雙方當事人除依前二項之請求外，不得另行請求其他損\n害賠償。"},{"id":"sec_30","title":"第二十九條：質押禁止","content":"除本契約另有約定外，買方同意不以基於本契約所取得之權利提\n供予第三人做為擔保或質押，否則即視為買方違約，其因此所造\n成賣方之損害應由買方負責賠償。如因買方與第三人發生糾紛，\n致買方基於本契約所取得之權利或金融貸款為第三人假扣押、假\n處分或遭其他強制執行處分時，買方並須負賣方因而所受之損害\n賠償責任。\n第 三 十 條：共同承買約定\n一、本契約如有共同承買者，除對本契約之買方義務共同負連帶\n責任外，並應指定一人（姓名： ）為送達代收\n人，賣方依本契約向買方所為之通知或意思表示以送達至送\n達代收人為合法送達，對買方全體均生合法送達之效力。\n二、買方如為數人者，買方願就本契約應繳付價款、稅費及其應\n履行之義務，均負連帶給付責任。"},{"id":"sec_31","title":"第三十一條：通信送達之方式","content":"買、賣雙方相互所為之徵詢、洽商或通知辦理事項，均應以書面\n按本契約所載之地址以掛號或存證信函付郵為之，買方如有變更\n地址或連絡處所，應即以書面掛號通知賣方變更，如因拒收或無\n\n人收受而致退回或無法送達者，雙方同意以郵局第一次投遞日視\n為送達日期。"},{"id":"sec_32","title":"第三十二條：本契約附件及效力","content":"一、本契約自簽約日起生效，本契約一式兩份，由買賣雙方各執\n乙份為憑，本契約之附件視為本契約之一部分，與本契約具\n同等效力，雙方均應共同遵守履行，如有任何一部分不予履\n行時，均視同違約。\n二、本契約簽訂後，如政府預售屋合約換約之規範有變更修改\n者，雙方同意遵守修法後之法律。\n三、買方對於與本契約土地所有權人簽立之「土地預定買賣契約\n書」之約定，雙方同意該契約書與本契約有密不可分之並存\n關係，任何一契約違約或解除時，其他另一契約亦同其效力。\n四、本契約書之附件及附圖為本契約之一部分，與本契約具有同\n等效力。買賣雙方同意免蓋騎縫章仍不影響本契約效力。"},{"id":"sec_33","title":"第三十三條：特別約定事項","content":"一、本社區公共設施之位置依照新北市政府核定之建造執照圖\n所標示位置，倘電力公司、自來水廠、消防隊、電信局等正\n式設計另指定位置及增設時，雙方均同意此項指定及增設。\n二、本社區外牆之廣告收益為本社區住戶共有。\n三、買方同意於辦理本房地及車位預定買賣合約之目的範圍內，\n包括且不限於賣方及其關係企業、本社區銷售之不動產經紀\n業者及其關係企業、精選團隊及相關地政士等，得為蒐集、\n電腦處理及利用個人資料，依個人資料保護法之相關規定合\n理使用買方所留存之資料；蒐集個人資料之目的、類別及使\n用之期間、地區、對象及方式詳如附件（十四）所示。"},{"id":"sec_34","title":"第三十四條：留置權約定","content":"買方於尚未付清價款、遲延利息、滯納金、違約金或各項稅費及\n完成交屋手續之前，賣方或其指定之地政士，對於買方之各項相\n關產權憑證及土地、建物之相關從物如鑰匙等有留置之權，買方\n充分認知。"},{"id":"sec_35","title":"第三十五條：合意管轄法院","content":"如因本約而發生涉訟時，雙方同意以臺灣新北地方法院為第一審\n管轄法院。"},{"id":"sec_36","title":"第三十六條：法令遵循","content":"本契約若有未盡事宜，依有關法令、不動產業界習慣、社會一般\n善良習俗行之習慣及平等互惠與誠實信用原則公平解決之。並由\n雙方各執一份為憑。\n\n本契約附件：\n（一）付款期別明細表\n（二）建材及設備說明\n（三）代刻印章委託書\n（四）委辦貸款委託書\n（五）自洽貸款協議書\n（六）分管協議書\n（七）社區管理規約\n（八）本戶平面示意圖、當層平面示意圖\n（九）一樓法定空地，一樓夾層平面示意圖、二樓、三樓、四樓、\n十九樓、二十樓露臺平面示意圖\n（十）地下一層、二層、三層示意圖\n（十一）屋突一層、二層、三層示意圖\n（十二）建造執照影本\n（十三）不動產開發信託證明書及說明書\n（十四）個人資料權益告知暨使用同意書\n\n立契約書人\n買 方：\n身 分 證 統 一 編 號：\n戶籍地址： 縣（市） 鄉（鎮市區） 村（里） 鄰\n路（街） 段 巷 弄 號 樓之 。\n通訊地址：□同戶籍地。\n縣（市） 鄉（鎮市區） 村（里） 鄰\n路（街） 段 巷 弄 號 樓之 。\n聯 絡 電 話：\n賣 方：丞石建築開發有限公司\n代 表 人：彭智祺\n統 一 編 號：53325647\n地 址：台北市松山區南京東路四段 16 號 10 樓\n聯 絡 電 話：（02）2771-3778\n不 動 產 經 紀 業：大可廣告有限公司\n代 表 人：彭智祺\n統 一 編 號：83251684\n地 址：台北市松山區南京東路四段 16 號 10 樓\n不 動 產 經 紀 人：彭賢春\n經 紀 人 證 照 號：（98）桃市經字第 001031 號\n中 華 民 國 年 月 日\n\n付款期別明細表\n附件（一）\n付 款 別 期款比例 房 屋 款（新台幣）\n訂金 仟 佰 拾 萬元整\n１２％\n簽約金 仟 佰 拾 萬元整\n一樓底板完成 ２％ 仟 佰 拾 萬元整\n十樓底板完成 ２％ 仟 佰 拾 萬元整\n屋頂板完成 ２％ 仟 佰 拾 萬元整\n外飾完成 １％ 仟 佰 拾 萬元整\n取得使用執照 １％ 仟 佰 拾 萬元整\n銀行貸款 ７５％ 仟 佰 拾 萬元整\n交屋保留款 ５％ 仟 佰 拾 萬元整\n總價款 １００％ 仟 佰 拾 萬元整\n■買方依付款明細表約定，按期如數給付現金予賣方。\n■本付款明細表之期別時間點，依實際建築興建工程之進度日期為主，不可歸\n咎於銷售現場預估進度時間而拒絕（或延遲）如期繳納。\n\n建材及設備說明\n附件（二）\n■建築結構\n一、 本大樓結構經專業結構技師電腦程式精密計算及設計，符合內政部頒布\n之建築技術規則之鋼筋混凝土結構（RC 結構），並依新北市政府工務\n局核准圖樣嚴格管制施工，具有承重、抗壓、防颱、耐震、防火等特性，\n均符合國家標準，並依建造執照核准圖樣施工，建築結構堅固安全。\n二、 本社區採用之鋼材、鋼筋符合鋼鐵業偵檢輻射污染作業要點之規定，絕\n無輻射污染現象，並採不定期抽樣檢核，確保工程品質。\n■建築設計\n一、 主牆身部分採用天然石材、丁掛磚、金屬包板，以新古典來表現，打造\n建築不朽典範。\n二、 本大樓戶外照明及公共空間照明聘請設計師精心規劃，經監控中心統一\n管制照明啟閉，達到地標性建築之效果。\n■外觀設計\n外觀設計特聘請知名設計師精心設計，建築規劃以尊重人性化之各種需求設\n計為主，並於建築規劃中將建築物設計融入享受陽光、空氣、景觀之空間，\n烘托整棟建築物的價值感。\n■庭園景觀\n一樓庭園景觀由名師設計，採用植栽搭配燈光照明以結合基地周遭環境做整\n體設計。\n■門廳\n一、 聘請設計師精心規劃設計，挑高飯店式迎賓大廳，並設門禁管制系統。\n二、 地坪採用磁磚或天然石材，門廳牆面採用磁磚拼貼搭配木作設計，平頂\n採用造型天花板，搭配藝術燈具，精心選用精緻傢俱及擺設，營造尊榮\n豪宅氣度。\n\n■電梯廳\n一、 地坪：採用天然石材或磁磚。\n二、 牆面：採用天然石材或磁磚搭配木作造型裝潢設計。\n三、 平頂：造型天花板搭配照明燈具整體設計。\n■電梯設備\n一、 電梯採用富士達或三菱或永大電梯，本社區電梯為交流變壓變頻電梯，\n一樓大廳一部公設使用電梯可承載 13 人份，速度 45M/MIN，兩幢每幢\n二部可承載 17 人份，速度 120M/MIN，設定樓層感應識別系統、微電\n腦智慧型控制廂門開關時間，照明燈、通風扇、電梯停電時自動切換至\n緊急電源、光幕防夾功能及錯按取消功能、IONFUL 離子除菌裝置。\n二、 緊急求救警鈴、對講機與管理中心連線，梯廳整體裝潢統一設計，豪華\n氣派，創造潔淨舒適寬敞之搭乘空間。\n■樓梯間\n公共樓梯間地坪舖設止滑磁磚，搭配金屬或實木扶手，牆面及平頂刷漆水泥\n漆，並附照明燈具及樓層指示燈。\n■露台、屋頂\n一、 露台及屋頂平台採用大信格雷盾防水處理，加 PS 板保護層，露台地坪\n舖設 20cm20cm 止滑磁磚，屋頂平台依景觀設計舖設室外隔熱磚。\n二、 屋頂突出物裝設涵蓋全區之避雷裝置。\n■門窗設備\n一、 一樓店舖：電動快速捲門。\n二、 玄關：採用鑄鋁防火門（正面鑄鋁板、背面進口板材）並搭配耶魯 Yale\n電子鎖，展現氣派奢華品味。\n三、 室內：採用木門，門框加防撞膠條附磁吸式靜音鎖。\n四、 浴室：採用木門加上通風百葉，門框加防撞膠條附磁吸式靜音鎖。\n五、窗戶：採日本不二鋁窗及三合一通風門、使用日本進口五金提升鋁窗使\n用性，並達到 CNS 高標準之抗風壓、水密性、氣密性，遮音性並使用\n5mm+Low-E +5mm 強化膠合玻璃。\n\n■室內裝修\n一、 一樓店鋪地面鋪設 80cm*80cm 拋光石英磚。\n住家客廳、餐廳、臥室：地面鋪設樂邁 LAMETT 石晶地板。\n（客變階段以客製化方式選用，超過客變階段則由賣方選擇使用）\n二、 浴廁：地坪採用 30cm30cm 冠軍、RAK、ROMAN 止滑磁磚及抿石\n子，牆面採用 60cm120cm 冠軍、RAK、ROMAN 磁磚搭配高級進口\n花磚拼貼。（客變階段以客製化方式選用，超過客變階段則由賣方選擇\n使用）\n三、 內牆：室內隔間採用濕式灌漿輕質隔間施作後刷乳膠漆。\n四、 平頂：客廳、臥室採用乳膠漆。浴廁採用矽酸鈣天花板及乳膠漆施作、\nLED 崁燈，其餘天花板由買方自行施作。\n■陽台規劃\n一、 地坪採用 20cm20cm 止滑磁磚及抿石子，平頂採用鋁企口天花板，並\n統一加裝 LED 崁燈。\n二、 住家工作陽台設水龍頭及雙桿電動曬衣架，洗衣機插座，洗衣機專用排水\n孔，並加設熱水器電源插座。\n■衛浴設備\n一、 住家主客浴室採用 TOTO 全自動馬桶，並設置 KOHLER 一體化面盆浴\n櫃組及面盆龍頭、KOHLER 鋁合金材照明除霧鏡櫃，附雙桿毛巾桿、掛\n衣勾，HANSGROHE 淋浴定溫龍頭及升降滑桿、三段式蓮蓬頭，\nPANASONIC 暖風機，皆預留吹風機插座，並施作淋浴間及淋浴門。\n二、 一樓店舖廁所採用 TOTO 全自動馬桶，並設置 KOHLER 一體化面盆浴\n櫃組及面盆龍頭，及 KOHLER 鋁合金材照明除霧鏡櫃，另附\nPANASONIC 暖風機，皆預留吹風機插座。\n三、 二十樓浴室配置 TOTO 壓克力浴缸。\n四、 各戶鏡櫃、浴櫃安裝尺寸依實際現況配置為準。\n\n■廚房設備【一樓店舖不附】\n一、 採用倍利嘉 BELEGA 廚具，附帝雉石或不鏽鋼檯面、不鏽鋼洗滌檯、\n金巨翰 BOSS 伸縮龍頭、吊櫥及林內 RINNAI 雙口 IH 感應爐、倍利嘉\nBELEGA 水幕式抽油煙機、林內 RINNAI 烘碗機。\n二、 另附烤漆玻璃、刀具架、不鏽鋼瀝水置盤架、電冰箱插座及電鍋插座（廚\n具尺寸配備，由本公司依各戶室內尺寸調配）。\n三、 另附貝斯特 BEST 電器收納櫃、博世 BOSCH 烤箱、中島附 CSK IH 感\n應爐、倍世 BWT 廚下淨水器。\n■空調系統\n各戶統一預留分離式冷氣電源及排水、採上方進入室內預留冷媒管穿孔、預\n留室內機之排水口、預留冷媒管所需穿樑套管。\n■地下室\n一、 地下室各層規劃汽車停車場，停車場入口設置 E-TAG 感應設備、電動\n遙控安全捲門，安全快速、操作安全、方便，另附交通號誌，確實管制\n進出車輛，顯示車道狀況確保行車安全。\n二、 各汽車位均預留電動車充電設備集線槽。\n三、 汽車停車位配置鋁合金製車輪擋。\n四、 地下室均採用 EPOXY 地坪。\n五、 地下室設置定時自動啟動排風設備，以維停車場空氣品質，並統一操作\n照明。\n六、 地下室設置 WIFI 系統，使網路訊號暢通不中斷。\n■垃圾處理\n一、 本大樓垃圾儲藏間設置垃圾冷藏室，並實施垃圾分類處理及冷藏處理。\n二、 垃圾冷藏室旁設置清洗水槽及水龍頭。\n■電器設備\n一、 採用單相三線式 110V/220V 供電或依台電規定供電，各戶採用獨立電\n\n錶集中設置以方便控制及管理，公共用電部份集中另加設公用電錶。\n二、 所有配管採用南亞或大洋或華夏正字標記高級 PVC 管符合 CNS 標準。\n電線採用太平洋或華新麗華電線電纜。\n三、 室內開關採用 PANASONIC 星光系列大型面板並附夜間指示燈。\n四、 廚房、後陽台、浴廁均設 110V 插座採用漏電斷路保護功能。\n■弱電設備\n一、 電視：設置 UHF/VHF 集合式天線，系統預留管路可供有線電視使用，\n客廳、主臥室均設天線出線孔。\n二、 電話：各戶客廳及主臥室均設電話出線口。\n三、 網路：於本社區統一裝置 FTTH 光纖網路，於每戶客廳及各臥室均設網\n路出線孔。\n■監視監控系統\n一、 社區進出大門及四周圍設置攝影機。\n二、 各層停車場梯廳出入口增設緊急對講機及陽極鎖與讀卡機。\n三、 智慧型自動化中央監控系統：整合統一監管，穩定安全。\n四、 影像對講機系統：管理員可直接對各住戶做室內呼叫。\n五、 彩色攝影機可監視電梯內、門廳、四周圍、車道出入、停車場等錄影存\n證，安全無虞。\n■機電監控系統\n一、 機電故障警報系統：機電設備如消防、揚水、廢水、雨水、污水等故障\n報警設備，如有不正常之運轉，可立即發出警示，以便由管理中心人員\n處理。\n二、 發電機油槽設油量不足警示設備。\n■給水、排水系統\n一、 採用間接供水，除總錶外各戶設獨立水錶，於地下室設水箱，屋頂設\n給水塔，並安裝倍世 BWT 紫外線殺菌設備、智慧型除氯設備、地下室\n水塔設置全自動泥沙雜質過濾器，水箱之地坪及牆面防水粉刷後貼磁\n磚。\n\n二、 各戶室內設止水開關。\n三、 污排水管皆採 PVC 管，皆符合衛生下水道規格標準，附總存水彎。\n四、 各戶冷熱水管皆採用不銹鋼管，熱水管加保溫披覆。\n五、 揚水管依法設置水錘吸收器。\n六、 污排水設備：依政府法規設置。\n七、 公共水箱蓋設警示設備，如被打開，警示訊號隨即傳達至管理中心，管\n理中心即派人員巡視處理。\n八、 水位監視系統：污廢水坑設水位警示設備，如有不正常之情況發生可隨\n即發生警示，以利管理中心之操作人員處理。\n九、 排水通氣正負壓防疫系統：加入 STUDOR P.A.P.A 正壓調節器，有效平\n衡排水時產生的正壓，避免穢氣於排水系統亂竄，提升社區安全衛生。\n■消防安全設備\n一、 所有消防設備均按政府法規設置施工，經消防檢查合格。\n二、 消防栓系統：各層依法規標準設置消防栓箱。\n三、 滅火器：各層皆依法規規定於適當之位置放置 ABC 乾粉滅火器。\n四、 自動泡沫系統：於地下室停車場部份，依消防法規設置施工，均勻分佈\n自動泡沫滅火設備於各角落，安全可靠，保障車輛安全。\n五、 自動灑水設備：依消防法規於地上層各戶室內設置消防灑水設備，配管\n採用明管設計，不施做天花板並設置灑水頭。\n六、 自動火警警報系統：各層各戶室內依法規定設有火警感知器，以利管理\n中心透過授信總機作必要處理及廣播，隨時隨地掌握狀況，確保住戶安\n全。\n七、 安全標示系統：大樓各層均依法規規定設置壁掛式安全門標示燈、避難\n方向指示燈、緊急照明燈，於停電或火警時，用於逃生方向及疏散人群\n之作用。\n八、 所有幹管支管均符合消防法及國家安全標準。\n\n■瓦斯設備\n本案採用整棟天然瓦斯，各戶獨立瓦斯錶，瓦斯配管由瓦斯公司統一規劃設\n計及安裝，僅供熱水器使用（熱水器由客戶自行設置）。\n■安全管理系統\n一、 車道入口處設飛梭 EFAFLEX 快速捲門並設有防壓車保護功能，車道出\n入口設有紅綠燈號誌，防止外車進入。\n二、 本建築物全棟內外公共區域大樓外圍、一樓大廳、停車場、電梯車廂、\n通往屋頂通道等均設 CCTV 監視攝影機，24 小時全天候監視錄影，並\n採用監控錄影設備，掌控社區狀況。\n三、 一樓門廳進出口、電梯內、地下室門廳採用感應式讀卡機，未經感應卡\n確認無法進入。\n四、 各戶室內設置彩色影像對講機，結合影像、對講、保全等功能，畫面訊\n號直通管理中心連線，提供住戶最方便舒適之系統。\n五、 住宅大門及露台戶落地門窗設有隱藏式磁簧。\n■緊急供電系統\n停電時可自動啟動發電機，傳輸全區消防、電梯、地下室燈光照明用電，各\n戶客廳電視、廚房冰箱、熱水器設緊急電源插座各一只。\n\n■特約事項\n一、 上列有關建材若因法令禁止進口或使用或不可歸責賣方之因素而無該\n建材，本公司在不損及購買者權益之原則下得採用同等級或更高級品。\n二、 因市場供需失調或廠商壟斷市場蓄意哄抬價格時，依法禁止使用時，由\n本公司統籌選定同等級替換。\n三、 賣方保證建造本建築物不使用不符合國家安全檢測標準之海砂及輻射\n鋼筋。\n四、 為維護整體建築物外觀與精緻格調，本公司及建築師保有各項立面、公\n共空間配置、地下室配置、外觀顏色、開口尺寸、色系搭配、建築材料\n材質、規格、本社區或建案之名稱、LOGO 等字體及懸掛處及公共設施、\n管道間、休憩設施及一樓景觀庭園等平面設計與配置之修改權利，但以\n不損及購屋者之權益為原則，以求盡善盡美，買方並同意賣方不另行通\n知。\n五、 為確保建築物各項立面之整體美觀，住戶需同意不得任意變更外觀、自\n行裝設鐵窗或其他類似之行為。\n六、 大理石、花崗石等天然石材，其色澤紋路因供貨批別先後或有部份差異，\n故銷售現場展現之樣品，僅供買方參考，買方同意上開石材應以施工當\n時所採用為準。\n七、 樣品屋及模型為裝潢之情境參考，不得依買方拍照相片為確認材質，建\n材設備以本合約書為基準。\n八、 其他事宜依政府頒訂相關法令為準。\n九、 另有關共同使用部分及公共設施、設備，亦同時由賣方提供現況清冊辦\n理移交，此部分因屬賣方增設無償贈送，買方、社區管理委員會或管理\n負責人均無要求賣方為任何特定施作或訂定施作標準之權利。\n\n代刻印章委託書\n附件（三）\n委託人 （以下簡稱買方）向丞石建築開發有限公司（以\n下簡稱賣方）購買本約之房屋，特委託賣方或指定之地政士代刻本人印章乙枚，\n由受託人保管負責專供辦理一切有關本戶房屋權利事宜，雙方以印章授權委託\n事項切結約定如下：\n一、 本同意書依據買賣雙方訂定之本契約書規定訂定之。\n二、 買方同意賣方代刻印章乙枚保管使用，並應於交屋時交還買方。\n三、 本式印章賣方僅得使用於下列相關用途：\n（一） 本約房地產權移轉登記及貸款抵押設定登記之申請、變更或撤銷。\n另本約所提及應用印之事項亦屬之。\n（二） 銀行對保，開戶及領取貸款、申報實價登錄。\n（三） 稅捐申報、撤銷水、電、瓦斯、電信之申請或變更。\n（四） 有關本房地領用各項文件之使用。\n四、 賣方不得將前項授權印章使用於本同意書以外之任何用途，否則賣方應負\n法律責任。\n五、 買賣雙方如有糾紛，雙方同意不得影響本同意書"},{"id":"sec_37","title":"第三條各項用途之印章使","content":"用，雙方同意依民事訴訟程序解決此類糾紛而不得影響本項授權之成立。\n六、 本項委託授權，買方係於簽訂「房屋預定買賣契約書」之同時本於自由意\n志、誠實信用之原則製作及充分瞭解後立本同意書存查。\n委 託 人（買方）：\n身 分 證 統 一 編 號：\n受 託 人 （ 賣 方 ）：丞石建築開發有限公司\n統 一 編 號：53325647\n中 華 民 國 年 月 日\n\n委辦貸款委託書\n附件（四）\n買方即委託人：\n賣方即受託人：丞石建築開發有限公司\n買方向賣方購買本約之房地，特委託賣方就上項不動產產權為擔保物向金\n融機構申請抵押貸款，其有關委託及約定事項如下，特立此委託書以資共同遵\n守：\n一、 買方委託丞石建築開發有限公司全權代辦貸款、抵押及擔保物保險等一切\n手續，並同意金融機構貸款房屋總金額為新台幣 仟 佰 拾\n萬元整，買方應於辦理對保手續之同時簽付撥款委託書予賣方及指定之金\n融機構各乙份，並應交付與上開貸款同額之擔保本票、取款條（或同性質\n之書據）暨存摺予賣方，於貸款核准後，賣方即可向承貸金融機構領取，\n或撥入賣方指定之銀行帳戶，作為買方購買賣方房屋應繳付之部份價款。\n二、 買方同意將前開房屋設定抵押權予承貸之金融機構作為擔保，設定金額依\n金融機構之規定辦理，並依金融機構之規定覓具保證人，保證履行償還貸\n款本息之義務。\n三、 本委託辦理貸款及抵押權設定事項，如需買方及買方保證人親自出面或補\n具有關證件時，買方應依賣方或其指定地政士之通知時間出面辦理或如期\n提出供辦，絕不拖延或拒絕，否則視為不辦理貸款，依本契約"},{"id":"sec_38","title":"第二十條第","content":"三項之約定辦理。\n四、 買方關於貸款手續及所貸款之金額、期限、利率、償還方式及保險種類、\n期限、費用，悉願依照約定金融機構之規定辦理。\n五、 房屋之產權名義人如為未成年人、正服義務兵役者、無固定職業者或不符\n金融機構貸款條件者，不能貸款者，應檢附經稅捐機關蓋章之年度報繳綜\n合所得稅申報書及納稅證明及扣繳憑單。\n六、 本委託書未載事項仍應依本約「"},{"id":"sec_39","title":"第二十條：貸款約定第一項」履行之。","content":"七、 本委託書簽訂後如未經賣方之同意，買方應依本約"},{"id":"sec_40","title":"第二十一條規定辦理，","content":"不得片面向貸款金融機構為任何停止或撤銷或延遲撥付之表示，否則即視\n為買方不辦理貸款，依本契約"},{"id":"sec_41","title":"第二十條第三項之約定辦理。","content":"此 致\n丞石建築開發有限公司\n立委託書人（買方）：\n身 分 證 統 一 編 號：\n受 託 人 （ 賣 方 ）：丞石建築開發有限公司\n統 一 編 號：53325647\n法 定 代 理 人：彭智祺\n通 訊 地 址：台北市松山區南京東路四段 16 號 10 樓\n中 華 民 國 年 月 日\n\n自洽貸款協議書\n附件（五）\n買方：\n賣方：丞石建築開發有限公司\n買方向賣方購買本約之房屋。茲因買方就上項不動產產權為擔保物，擬自\n行向金融機構洽辦貸款，請賣方配合辦理貸款手續，特立此協議書以資共同遵\n守：\n一、 買方預定自洽房屋貸款之總金額為新台幣 仟 佰 拾 萬元\n整，貸款核撥後作為支付買賣契約約定之部份價款。\n二、 買方認知並同意，賣方係基於服務之立場協助買方辦理自洽貸款，故不論\n買方因何理由無法獲貸，概與賣方無涉，買方仍應依約繳付價款。另為確\n保賣方權益，買方及其自洽貸款金融機構應同意前開房屋之產權登記與抵\n押權設定手續同時辦理。\n三、 買方辦理自洽貸款時，為維護賣方收取價金之權益，應遵守下列約定事項：\n（一） 買方應於賣方通知日起算七日內來文告知其自洽之承貸銀行，並配\n合賣方辦理債權確保手續。\n（二） 買方應於建物使用執照核發之日起十五日內，簽付撥款委託書予賣\n方及指定之金融機構各乙份，並應交付與上開貸款同額之擔保本票、\n取款條（或同性質之書據）暨存摺予賣方，於貸款核准後，賣方即可\n向承貸金融機構領取，或撥入賣方指定之銀行帳戶，作為買方購買\n賣方房屋應繳付之部份價款。\n（三） 買方自洽貸款少於房屋貸款之總金額或承貸銀行之實際放款金額少\n於自洽貸款擬貸金額時，買方承貸銀行向賣方確認核貸金額後，買\n方同意於賣方通知日起七日內，買方以現金一次給付賣方。\n（四） 買方如有中途改變主意不貸、貸款之條件不合、通知金融機構暫緩\n撥款或依本書約定視為放棄貸款之情事者，應依「"},{"id":"sec_42","title":"第二十條：貸款約","content":"定第一項或第三項」之約定辦理，以抵付購買上項不動產應繳之價\n款，否則賣方得依本約有關違約之處罰處理。\n（五） 買方承貸銀行核准撥款時，如因買方欠繳保險費或未辦保險，致賣\n方無法領取貸款時，賣方得代為繳納或辦理，再向買方收取相關費\n用。\n（六） 本協議書未載事項仍應依本約「"},{"id":"sec_43","title":"第二十條：貸款約定第二項」履行","content":"之。\n（七） 本協議書簽訂後如未經賣方之同意，買方應依本約"},{"id":"sec_44","title":"第二十條規定辦","content":"理，不得片面向貸款金融機構為任何停止或撤銷或延遲撥付之表示，\n否則即視為買方不辦理貸款，依本契約"},{"id":"sec_45","title":"第二十條第三項之約定辦理。","content":"此 致\n丞石建築開發有限公司\n買 方：\n身分證統一編號：\n賣 方：丞石建築開發有限公司\n統 一 編 號：53325647\n法 定 代 理 人：彭智祺\n通 訊 地 址：台北市松山區南京東路四段 16 號 10 樓\n中 華 民 國 年 月 日\n\n分管協議書\n附件（六）\n立分管協議書人 （以下簡稱買方）向丞石建築開發有限公司\n（以下簡稱賣方）購買本約之房屋，買方無條件同意本社區下列共用部分依下\n列方式分管使用：\n一、地下一層、二層、三層汽車停車空間及部分車道，由購買汽車停車位者分\n攤此部分持分，並得依相關法令管理、使用、收益及處分，未購買汽車停\n車位之承購戶未分攤此部分產權持分，並不得妨礙購買汽車停車位者之使\n用。如遇空襲時地下一層、二層、三層應全部開放供全體住戶作緊急避難\n之用。\n二、本社區地下室機車停車位區、自行車停車位區、社區使用停車位及資源回\n收車停放車位屬於社區公共區域，係依建築法令規劃其位置及編號，其面\n積登記於共有部分，由社區管理委員會依區分所決議其管理、使用及維護\n方式。\n三、本社區開放空間及告示牌、共有部份之屋頂突出物及屋頂平台，不得為約\n定專用部分，除法規另有規定外，不得作為其他使用，並由管委會管理維\n護。\n四、法定空地--本社區一樓臨 S1 戶、S2 戶、S3 戶、S5 戶、S6 戶、S7 戶、S8\n戶、S9 戶、S10 戶、S11 戶、S12 戶、S13 戶、S17 戶之法定空地，由毗\n鄰之區分所有權人專用及維護，其餘法定空地，由賣方做整體規劃，約定\n由所有區分所有權人共同使用，並由管理委員會管理維護。\n五、露臺--本社區一樓 S1 戶、S2 戶、S3 戶、S5 戶、二樓 A3 戶、B2 戶；三\n樓 S15 戶、A5 戶、A6 戶、B1 戶、B5 戶、B6 戶、B9 戶；四樓 B6 戶及\n十九樓 A1 戶、A2 戶、A3 戶、A5 戶、B1 戶、B2 戶、B3 戶、B5 戶之露\n台依現行法令不辦理產權登記，買方暨本社區全體區分所有權人清楚知悉\n並約定由相鄰之該戶之區分所有權人專用及維護。\n\n六、本房屋共有部分包含梯廳、管委會使用空間、部分車道及地下一層、二層、\n三層之管道間、車道出入口、台電配電場所、機房、緊急發電機室、電信\n機房、消防泵浦機房、防空避難室（兼停車空間）、水箱、地下室電樓梯\n間、管道間、機車停車位、自行車停車位、各棟一樓以上電樓梯間、屋頂\n突出物、屋頂水箱、屋頂電梯機房、屋頂消防水箱及其他依法令應列入共\n有部分之項目，供全體住戶共有使用，由管委會管理之。\n七、本建物屋頂裝飾物或外牆，起造人得設置公司名稱、社區標誌等，並由本\n建物管理委員會統籌管理及維護修繕。\n八、賣方無償提供景觀植栽及附屬設施設備等公共設施部分，此部分因屬賣方\n增設贈送，買方全體同意就上開公共空間所規劃設置之設施及植栽美化，\n以現場完成之現況點交予管理委員會或管理負責人接管，交屋後由社區管\n委會無條件自行負責處理，買方及管委會同意日後不得透過區分所有權人\n會議之決議方式變更使用方式，或向賣方提出任何重作、改良、拆除、替\n換之主張。\n九、為維護本社區整體價值、提升社區素質並使各戶能有效運用其室內空間，\n買方同意維持外觀統一，各戶空調之室外機及熱水器統一按賣方規劃之位\n置予以裝置，不可放置於其他位置，買方並同意日後不透過管委會決議變\n更使用方式或設置之位置。\n十、本社區外觀燈光規劃及景觀設置，是維護大樓整體價值及外觀之精緻格\n調，買方同意上述規劃均依照賣方建議之方案統籌開關管控執行，買方不\n得以任何理由拒絕繳納相關公共電費或取消燈光計畫。\n十一、本社區因日後清洗外牆需要，於部分區分所有權人之陽台、露台、屋頂\n平台裝設吊掛設備，買方應無條件提供管理委員會使用吊掛設備清洗外\n牆，為買方明確知悉並同意。\n十二、本「分管協議書」之效力及於日後之繼受人，並由其受讓及承擔本協議\n書之權利及義務，倘買方違背本協議書之條款，對其他住戶因此所受之\n損害應負賠償責任。\n\n十三、本分管協議書之內容，買方同意將之納入社區規約，絕無異議。\n本協議書經立書人詳閱同意後，特簽章立書為憑。\n立 協 議 書 人 ：\n身 分 證 統 一 編 號：\n中 華 民 國 年 月 日\n\n社區管理規約\n附件（七）\n本「閱讀台灣」公寓大廈區分所有權人為增進共同利益，確保良好生活環\n境之共同遵守事項，訂定規約條款如下：\n第一章 使用區分及管理"},{"id":"sec_46","title":"第一條本規約效力所及範圍","content":"本規約效力及於本公寓大廈全體區分所有權人、無權占有人及住\n戶。\n本公寓大廈之範圍：（請就下列二者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.為使用執照及其竣工圖所載之基地、建築物及附屬設施（以下\n簡稱標的物件）。\n□2.如附件中所載之基地、建築物及附屬設施（以下簡稱標的物\n件）。"},{"id":"sec_47","title":"第二條專有部分、共用部分、約定專用部分、約定共用部分","content":"一、本公寓大廈專有部分、共用部分、約定專用部分、約定共用部\n分之範圍界定如下：\n（一）專有部分：指公寓大廈之一部分，具有使用上之獨立性，\n且為區分所有之標的者。為編釘獨立門牌號碼或所在地\n址證明之單位，並登記為區分所有權人所有者。\n（二）共用部分：指不屬專有部分與專有附屬建築物，而供共\n同使用者。\n（三）約定專用部分：公寓大廈共用部分經約定供特定區分所\n有權人使用者，使用者名冊由管理委員會造冊保存。\n（四）約定共用部分：公寓大廈專有部分經約定供共同使用\n者。\n\n二、本公寓大廈專有部分、共用部分、約定專用部分、約定共用部\n分之區劃界限：（請就下列二者勾選其一，未勾選者視為選擇\n1.之情形）\n□1.詳如使用執照及其竣工圖所載之基地、建築物及附屬設施\n之圖說。\n■2.詳如標的物件之圖說。\n三、本公寓大廈法定空地、頂樓平台為共用部分，除下列約定專用\n外（詳如附件之圖說），應供全體區分所有權人及住戶共同使\n用。\n（一）露台及法定空地\n露台及法定空地由緊臨露台及法定空地之住戶無償取\n得永久專用使用權，住戶應依法管理維護使用，並遵守\n本公寓大廈住戶規約，不得增建任何違章建築。\n（二）社區標誌\n本公寓大廈屋頂裝飾物或外牆起造人得設置社區標誌，\n並同意由公寓大廈管理委員會統籌管理及維護。\n四、停車空間應依下列規定：\n（一）停車空間之權利（請就下列四者勾選，可複選，未勾選\n者視為選擇 1.之情形）\n■1.為共用部分且有登記車位編號者，依其登記之編\n號；未辦理登記編號者，依起造人或建築業者之買\n賣契約書或分管契約書，為約定專用部分使用。\n□2.無分管契約書為共同持分之停車空間，經區分所有\n權人會議決議或授權管理委員會，得將部分之停車\n空間約定為約定專用部分供特定區分所有權人使\n用。\n\n□3.共用部分及約定共用部分劃設機車停車位，供住戶\n之機車停放。\n□4.停車空間之其他權利形式： 。\n（二）停車空間之使用管理辦法：本公寓大廈汽車位僅限停放\n汽車或重型機車一部使用，不可放置雜物或停放機車。\n另停車位管理費收取標準、違反義務處理方式等，授權\n管理委員會訂定。\n五、本公寓大廈外牆（包含外牆面及其構造）之使用管理（請就下\n列二者勾選其一，未勾選者視為選擇 1.之情形）\n■1.本公寓大廈外牆之修繕、管理、維護，由管理負責人或管\n理委員會為之。管理負責人或管理委員會每年至少應檢視\n一次外牆磁磚或飾面材料之劣化情形，並作成紀錄。外牆\n磁磚或飾面材料如有新增剝落或浮起（凸起）之情形，管\n理負責人或管理委員會除應請求召集人於一個月內召開\n區分所有權人會議討論相關修繕、管理、維護事宜外，如\n有影響公共安全之虞，應立即設置相關安全緊急處理措施\n（如防護網或警示帶），並通報當地直轄市、縣（市）政\n府。\n□2.本公寓大廈外牆之使用管理方式： 。\n六、新建公寓大廈周圍上下、外牆面、頂樓平台及不屬專有部分之\n防空避難設備，除應符合法令規定外，並依規定向主管機關完\n成報備後，限制（請就下列二者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.不得有變更構造、顏色、設置廣告物、鐵鋁窗或其他類似\n之行為。\n□2.其變更構造、顏色、設置廣告物、鐵鋁窗或其他類似之行\n為，須符合下列規定後，再依相關法令規定辦理：\n\n七、公寓大廈有十二歲以下或六十五歲以上之住戶時，外牆開口部\n或陽臺得設置不妨礙逃生且不突出外牆面之防墜設施（係避免\n兒童由外牆開口部或陽臺墜落所為之設施）。防墜設施設置後，\n如因設置理由消失（無十二歲以下或六十五歲以上之住戶）且\n不符前款規定者，區分所有權人應予改善或回復原狀。本公寓\n大廈設置防墜設施之材質、顏色、形式如下：\n■1.除了符合上開不妨礙逃生且不突出外牆面外，無其他限制\n規定。\n□2.應依下列規定辦理： 。"},{"id":"sec_48","title":"第三條共用部分及約定共用部分之使用管理","content":"一、住戶對共用部分及約定共用部分之使用應依其設置目的及通\n常使用方法為之。\n本公寓大廈除依建築法規設置共用設施以外之共用部分及約\n定共用部分設施如下：（請就下列二者勾選其一，未勾選者視\n為選擇 1.之情形）\n□1.無其他共用設施設置。\n■2.包括：接待大廳、健身房、兒童遊戲室…等設施，其使用\n管理及維護辦法授權予管理委員會訂定實施。\n二、共用部分及約定共用部分於本規約生效前，有違反建築法第二\n十五條規定者，（請就下列二者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.依建築法相關規定辦理。\n□2.管理負責人或管理委員會應於 月內予以改善或回復原\n狀。\n三、共用部分及約定共用部分設置或改善行動不便者使用設施者，\n管理委員會應予為之。其衍生費用之分擔或負擔方式如下：\n（一）如係專有部分變更使用用途時，依法應設置者，（請就\n\n下列二者勾選其一，未勾選者視為選擇 1.之情形）\n■1.由該區分所有權人或住戶負擔，超過一戶者，按其\n各戶所占建物登記面積比例分攤。\n□2.其他負擔或分擔方式： 。\n（二）如係因法令規定須改善或經區分所有權人會議決議設\n置者，（請就下列二者勾選其一，未勾選者視為選擇 1.\n之情形）\n■1.由管理費或公共基金支應。\n□2.其他負擔或分擔方式： 。"},{"id":"sec_49","title":"第四條專有部分及約定專用部分之使用管理","content":"一、區分所有權人除法律另有限制外，對其專有部分，得自由使用、\n收益、處分，並排除他人干涉。\n二、專有部分不得與其所屬建築物共用部分之應有部分及其基地\n所有權或地上權之應有部分分離而為移轉或設定負擔。\n三、區分所有權人對專有部分之利用，不得有妨害建築物之正常使\n用及違反區分所有權人共同利益之行為。\n四、區分所有權人及住戶對專有部分及約定專用部分之使用，應依\n使用執照所載用途為之。\n五、區分所有權人及住戶對於專有部分及約定專用部分應依符合\n法令規定之方式使用，並不得有損害建築物主要構造及妨害建\n築物環境品質。\n六、專有部分及約定專用部分於本規約生效前，有違反建築法第二\n十五條規定者，（請就下列二者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.依建築法相關規定辦理。\n□2.該區分所有權人應於 月內予以改善或回復原狀。\n\n第二章 區分所有權人會議"},{"id":"sec_50","title":"第五條區分所有權人會議之目的","content":"區分所有權人會議之召開係為共同事務及涉及權利義務之有關事\n項。"},{"id":"sec_51","title":"第六條區分所有權人會議之召開","content":"一、定期會議及臨時會議之召開\n（一）定期會議每年召開 次（至少一次）。\n（二）有下列情形之一者，應召開臨時會議：\n1. 發生重大事故有及時處理之必要，經管理負責人或\n管理委員會請求者。\n2. 經區分所有權人五分之一以上及其區分所有權比例\n合計五分之一以上，以書面載明召集之目的及理由\n請求召集者。\n二、召集人之產生方式\n區分所有權人會議之召集人，除公寓大廈管理條例"},{"id":"sec_52","title":"第二十八條規定外，由具區分所有權人資格之管理負責人或管理委員會主","content":"任委員擔任；管理負責人或管理委員會主任委員不具區分所有\n權人資格時，得由具區分所有權人資格之管理委員擔任之。前\n項無管理負責人或管理委員會，或無區分所有權人擔任管理負\n責人、主任委員或管理委員時，由區分所有權人互推一人為召\n集人，召集人無法產生時，以區分所有權人名冊依序輪流擔任。\n三、開會通知\n區分所有權人會議，應由召集人於開會前十日以書面載明開會\n內容，通知各區分所有權人。但有急迫情事須召開臨時會者，\n得於公告欄公告之；公告期間不得少於二日。開會通知之發送，\n以開會前十日登錄之區分所有權人名冊為據。區分所有權人資\n格於開會前如有異動時，取得資格者，應出具相關證明文件。\n\n四、出席資格\n區分所有權人會議應由區分所有權人本人出席，數人共有一專\n有部分者，應推由一代表出席。區分所有權人因故無法出席區\n分所有權人會議時，得以書面委託他人代理出席。但受託人於\n受託出席之區分所有權比例及區分所有權人之人數以不超過\n全部之五分之一為上限。代理人應於簽到前，提出區分所有權\n人之出席委託書。\n會議之目的如對某專有部分之承租者或使用者有利害關係時，\n該等承租者或使用者經該專有部分之區分所有權人同意，得列\n席區分所有權人會議陳述其意見。"},{"id":"sec_53","title":"第七條區分所有權人會議之開議","content":"一、區分所有權人會議之主席（請就下列二者勾選其一，未勾選者\n視為選擇 1.之情形）\n■1.會議主席產生之優先順序：\n（1）由召集人擔任。\n（2） 由出席區分所有權人會議之區分所有權人於會議開\n始時推選一人擔任。\n□2.會議主席產生之其他方式： 。\n二、應經區分所有權人會議決議事項：\n（一）規約之訂定或變更。\n（二）公寓大廈之重大修繕或改良。\n（三）公寓大廈有公寓大廈管理條例"},{"id":"sec_54","title":"第十三條第二款或第三","content":"款情形之一須重建者。\n（四）住戶之強制遷離或區分所有權之強制出讓。\n（五）約定專用或約定共用事項。\n（六）管理委員執行費用之支付項目及支付辦法。\n（七）其他依法令需由區分所有權人會議決議之事項。\n\n三、區分所有權人會議之開議及決議額數\n各專有部分之區分所有權人有一表決權。數人共有一專有部分\n者，該表決權應推由一人行使。\n區分所有權人會議之出席人數與表決權之計算，於任一區分所\n有權人之區分所有權占全部區分所有權五分之一以上者，或任\n一區分所有權人所有之專有部分之個數超過全部專有部分個\n數總合之五分之一以上者，其超過部分不予計算。\n區分所有權人會議討論事項：（請就下列三者勾選其一，未勾\n選者視為選擇 1.之情形）\n■1.除第二款第一目至第五目應有區分所有權人三分之二以上\n及其區分所有權比例合計三分之二以上出席，以出席人數\n四分之三以上及其區分所有權比例占出席人數區分所有權\n四分之三以上之同意行之外，其餘決議均應有區分所有權\n人過半數及其區分所有權比例合計過半數之出席，以出席\n人數過半數及其區分所有權比例占出席人數區分所有權合\n計過半數之同意行之。\n□2.除第二款第一目至第五目應有區分所有權人三分之二以\n上及其區分所有權比例合計三分之二以上出席，以出席人\n數四分之三以上之同意行之外，其餘決議均應有區分所有\n權人過半數及其區分所有權比例合計過半數之出席，以出\n席人數過半數之同意行之。\n□3.區分所有權人會議開議及決議之其他額數： 。"},{"id":"sec_55","title":"第八條區分所有權人會議之重新召集","content":"區分所有權人會議依前條第三款規定未獲致決議、出席區分所有權\n人之人數或其區分所有權比例合計未達前條第三款定額者，召集人\n得就同一議案重新召集會議；其開議應有區分所有權人三人並五分\n之一以上及其區分所有權比例合計五分之一以上出席，以出席人數\n\n過半數及其區分所有權比例占出席人數區分所有權合計過半數之\n同意作成決議。\n前揭決議之會議紀錄應於會後十五日內送達各區分所有權人後，各\n區分所有權人得於七日內以書面表示反對意見。書面反對意見未超\n過全體區分所有權人及其區分所有權比例合計半數時，該決議視為\n成立。\n會議主席應於會議決議成立後十日內以書面送達全體區分所有權\n人並公告之。"},{"id":"sec_56","title":"第九條議案成立之要件","content":"一、於區分所有權人會議辦理管理委員選任事項時，應在開會通知\n中載明並公告之，不得以臨時動議提出。\n二、會議之目的如為專有部分之約定共用事項，應先經該專有部分\n之區分所有權人書面同意，始得成為議案。\n三、約定專用部分變更時，應經使用該約定專用部分之區分所有權\n人同意。但該約定專用顯已違反公共利益，經管理委員會或管\n理負責人訴請法院判決確定者，不在此限。\n四、公寓大廈外牆面、頂樓平台、設置廣告物、無線電台基地台等\n類似強波發射設備或其他類似之行為，設置於屋頂者，應經頂\n層區分所有權人同意；設置其他樓層者，應經該樓層區分所有\n權人同意。該層住戶，並得參加區分所有權人會議陳述意見。"},{"id":"sec_57","title":"第十條會議紀錄","content":"區分所有權人會議之決議事項，應作成會議紀錄，由主席簽名，於\n會後十五日內送達各區分所有權人並公告之。\n會議紀錄應包括下列內容：\n一、開會時間、地點。\n二、出席區分所有權人總數、出席區分所有權人之區分所有權比例\n總數及所占之比例。\n\n三、討論事項之經過概要及決議事項內容。\n會議紀錄，應與出席人員（包括區分所有權人及列席人員）之\n簽名簿及代理出席之委託書一併保存。\n第三章 管理委員會"},{"id":"sec_58","title":"第十一條管理委員會之目的、人數","content":"一、管理委員會之目的\n管理委員會應向區分所有權人會議負責，並向其報告會務；由\n區分所有權人選任管理委員所設立之組織，係為執行區分所有\n權人會議決議事項及公寓大廈管理維護工作。\n二、管理委員會人數\n為處理區分所有關係所生事務，本公寓大廈由區分所有權人選\n任住戶為管理委員組成管理委員會。管理委員會組成如下：\n（一）主任委員一名。\n（二）副主任委員一名。\n（三）財務委員（負責財務業務之委員）一名。\n（四）監察委員（負責監察業務之委員）一名。\n（五）委員三名。\n前項委員名額，合計七名，並得置候補委員三名。委員名額之\n分配方式：（請就下列五者勾選其一，未勾選者視為選擇 1.之\n情形）\n□1.採不分配方式為之。\n□2.採分層劃分：自第 層至第 層 名；自第 層至\n第 層 名；自第 層至第 層 名。\n□3.採分棟劃分： 棟 名； 棟 名； 棟 名。\n■4.採分區劃分：住宅區Ａ棟三名；Ｂ棟三名，店舖區一名。\n□5.管理委員名額之其他分配方式： 。"},{"id":"sec_59","title":"第十二條主任委員、副主任委員、監察委員、財務委員及管理委員之資格、","content":"選任、任期及解任\n一、管理委員選任之資格及其限制\n（一）管理委員選任之資格：（請就下列五者勾選其一，未勾\n選者視為選擇 1.之情形）\n■1.主任委員、副主任委員、監察委員及財務委員，由\n具區分所有權人身分之住戶任之，並有居住事實，\n其他管理委員由住戶任之。\n□2.主任委員、副主任委員、監察委員及財務委員，由\n具區分所有權人身分或其配偶之住戶任之，其他管\n理委員由住戶任之。\n□3.管理委員須由具區分所有權人身分之住戶任之。\n□4.管理委員由住戶任之。\n□5.管理委員選任之其他資格及其限制： 。\n（二）每一區分所有權僅有一個選舉與被選舉權。\n（三）主任委員、財務委員及監察委員，連選得連任一次，其\n餘委員連選得連任。\n（四）主任委員、副主任委員、監察委員及財務委員之消極資\n格：\n有下列情事之一者，不得充任主任委員、副主任委員、\n監察委員及財務委員，其已充任者，即當然解任。\n1. 曾犯詐欺、背信、侵占罪或違反工商管理法令，經受\n有期徒刑一年以上刑期之宣告，服刑期滿尚未逾二年\n者。\n2. 曾服公職虧空公款，經判決確定，服刑期滿尚未逾二\n年者。\n3. 受破產之宣告，尚未復權者。\n\n4. 有重大喪失債信情事，尚未了結或了結後尚未逾二年\n者。\n5. 無行為能力或限制行為能力者。\n（五）主任委員、副主任委員、財務委員、監察委員及管理委\n員選任時應予公告，解任時，亦同。\n二、管理委員及職位之選任\n（一）管理委員之選任方式：（請就下列五者勾選其一，未勾\n選者視為選擇 1.之情形）\n■1.（1）委員名額未按分區分配名額時，採記名單記法\n選舉，並以獲出席區分所有權人及其區分所有\n權比例多者為當選。\n（2）委員名額按分區分配名額時，採無記名單記法\n選舉，並以獲該分區區分所有權人較多者為當\n選。\n□2.採無記名複記法選舉，並以獲該分區區分所有權人\n較多者為當選。\n□3.採無記名單記法選舉，並以獲該分區區分所有權人\n較多者為當選。\n□4.依區分所有權人名冊輪流擔任。\n□5.管理委員之其他選任方式： 。\n（二）主任委員由管理委員互推之。\n主任委員解職出缺時：（請就下列四者勾選其一，未勾\n選者視為選擇 1.之情形）\n■1.由管理委員互推遞補之；主任委員出缺至重新選任\n期間，由副主任委員行使主任委員職務。\n□2.由副主任委員遞補。\n□3.由管理委員互推遞補之；主任委員出缺至重新選任\n\n期間，由 委員行使主任委員職務。\n□4.主任委員出缺期間之其他代行職務及遞補方式\n。\n（三）副主任委員、監察委員及財務委員（請就下列三者勾選\n其一，未勾選者視為選擇 1.之情形）\n□1.由主任委員於管理委員中選任之。\n■2.由管理委員互推之。\n□3.其他之選任方式： 。\n副主任委員、監察委員及財務委員解職出缺時，應\n於管理委員中重新選任遞補之。\n（四）管理委員出缺時，由候補委員依序遞補，其任期以補足\n原管理委員所遺之任期為限，並視一任。\n（五）管理委員之選任，由管理委員會於任期屆滿前二個月辦\n理：（請就下列三者勾選其一，未勾選者視為選擇 1.之\n情形）\n■1.於區分所有權人會議中辦理選任。\n□2.依區分所有權人名冊輪流擔任。\n□3.管理委員選任之其他辦理方式：\n。\n三、管理委員之任期，（請就下列三者勾選其一，未勾選者視為選\n擇 1.之情形）\n□1.自 年 月 日起至 年 月 日止，為期一年。\n□2.自 年 月 日起至 年 月 日止，為期二年。\n□3.自 年 月 日起至 年 月 日止，為期 年\n月（至少一年，至多二年）。\n四、管理委員之解任、罷免\n（一）管理委員有下列情事之一者，即當然解任。\n\n1. 任職期間，喪失本條第一款管理委員選任之資格者。\n2. 管理委員喪失住戶資格者。\n3. 管理委員自任期屆滿日起，視同解任。\n（二）管理委員之罷免\n1. 主任委員及其他管理委員職務之罷免（請就下列二者\n勾選其一，未勾選者視為選擇（1）之情形）\n■（1）應三分之二以上之管理委員書面連署為之。\n□（2）管理委員職務之其他罷免方式： 。\n2. 管理委員之罷免（請就下列二者勾選其一，未勾選者\n視為選擇（1）之情形）\n■（1）應由被選任管理委員之選舉權人二分之一以\n上之書面連署為之。\n□（2）管理委員之其他罷免方式： 。"},{"id":"sec_60","title":"第十三條主任委員、副主任委員、監察委員、財務委員及管理委員之權限","content":"一、主任委員對外代表管理委員會，並依管理委員會決議執行公寓\n大廈管理條例"},{"id":"sec_61","title":"第三十六條規定事項。","content":"二、主任委員應於定期區分所有權人會議中，對全體區分所有權人\n報告前一會計年度之有關執行事務。\n三、主任委員得經管理委員會決議，對共用部分投保火災保險、責\n任保險及其他財產保險。\n四、主任委員得經管理委員會決議通過，將其一部分之職務，委任\n其他委員處理。\n五、副主任委員應輔佐主任委員執行業務，於主任委員因故不能行\n使職權時代理其職務。\n六、財務委員掌管公共基金、管理及維護分擔費用（以下簡稱為管\n理費）、使用償金等之收取、保管、運用及支出等事務。\n七、監察委員應監督管理委員、管理委員會，遵守法令、規約及區\n\n分所有權人會議、管理委員會之決議執行職務。\n八、管理委員應遵守法令、規約及區分所有權人會議、管理委員會\n之決議。為全體區分所有權人之利益，誠實執行職務。\n九、管理委員之報酬（請就下列三者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.為無給職。\n□2.得為工作之需要支領費用或接受報酬，其給付方法，應依\n區分所有權人會議之決議為之。\n□3.管理委員其他報酬給付方式： 。\n十、公共安全檢查與消防安全設備檢修之申報及改善之執行。"},{"id":"sec_62","title":"第十四條管理委員會會議之召開","content":"一、主任委員召開管理委員會會議（請就下列二者勾選其一，未勾\n選者視為選擇 1.之情形）\n□1.應每二個月乙次。\n■2.應每一個月乙次。\n二、管理委員會會議，應由主任委員於開會前七日以書面載明開會\n內容，通知各管理委員。\n三、發生重大事故有及時處理之必要，或經三分之一以上之委員請\n求召開管理委員會會議時，主任委員應儘速召開臨時管理委員\n會會議。\n四、管理委員會會議開議決議之額數（請就下列四者勾選其一，未\n勾選者視為選擇 1.之情形）\n■1.應有過半數之委員出席參加，其討論事項應經出席委員過\n半數之決議通過。\n□2.應有 以上之委員出席參加，其討論事項應經出席委\n員 以上之決議通過。\n□3.討論事項應經全體管理委員 以上之決議通過。\n\n□4.管理委員會之其他開議決議額數： 。\n管理委員因故無法出席管理委員會會議得以書面委託\n（請就下列五者勾選其一，未勾選者視為選擇 1.之情形）\n■1.其他管理委員出席，但以代理一名委員為限。\n□2.候補委員出席，但以代理一名委員為限。\n□3.其配偶或直系親屬出席。\n□4. 出席，但以代理一名委員為限。\n□5.管理委員出席會議之其他代理方式： 。\n五、有關管理委員會之會議紀錄，應包括下列內容：\n（一）開會時間、地點。\n（二）出席人員及列席人員名單。\n（三）討論事項之經過概要及決議事項內容。\n六、管理委員會會議之決議事項，應作成會議紀錄，由主席簽名，\n於會後十五日內公告之。"},{"id":"sec_63","title":"第十五條管理委員會之保管、公告及移交責任","content":"一、管理委員會之保管責任\n（一）規約、區分所有權人會議及管理委員會之會議紀錄、簽\n到簿、代理出席之委託書、使用執照謄本、竣工圖說、\n水電、消防、機械設施、管線圖說、公共安全檢查及消\n防安全設備檢修之申報文件、印鑑及有關文件應由管理\n委員會負保管之責。\n（二）管理委員會應製作並保管公共基金餘額、會計憑證、會\n計帳簿、財務報表、欠繳公共基金與應分攤或其他應負\n擔費用情形、附屬設施設備清冊、固定資產與雜項購置\n明細帳冊、區分所有權人與區分所有權比例名冊等。\n（三）共用部分、約定共用部分及其附屬設施設備之點收及保\n管。\n\n（四）收益、公共基金及其他經費之保管。\n二、管理委員會公告責任\n（一）主任委員、副主任委員、監察委員、財務委員及管理委\n員選任時應予公告，解任時亦同。\n（二）公共基金或區分所有權人、住戶應分擔或其他應負擔費\n用之收支、保管及運用情形之定期公告。\n（三）會計報告、結算報告及其他管理事項之提出及公告。\n（四）管理委員會為原告或被告時，應將訴訟事件要旨速告區\n分所有權人。\n（五）區分所有權人會議、管理委員會之會議紀錄應於限期內\n公告。\n（六）本公寓大廈公告設置於 。\n三、管理委員會之移交責任\n公共基金收支情形、會計憑證、會計帳簿、財務報表、印鑑及\n餘額，管理委員會保管之文件及資產等，於管理委員會解職、\n離職或改組時移交新管理負責人或新管理委員會。"},{"id":"sec_64","title":"第十六條管理負責人準用規定之事項","content":"未成立管理委員會或管理委員會任期屆滿解職，未組成繼任之管理\n委員會期間，由區分所有權人推選住戶一人為管理負責人，未推選\n管理負責人時，以區分所有權人依法互推之召集人或申請指定之臨\n時召集人為管理負責人。\n管理負責人準用下列管理委員會應作為之規定：\n一、管理負責人執行公寓大廈管理條例"},{"id":"sec_65","title":"第三十六條管理委員會職","content":"務規定事項。\n二、 管理負責人為原告或被告時，應將訴訟事件要旨速告區分所有權\n人。\n三、管理負責人應向區分所有權人會議負責，並向其報告。\n\n第四章 財務管理"},{"id":"sec_66","title":"第十七條公共基金、管理費之繳納","content":"一、為充裕共用部分在管理上必要之經費，除由起造人依法提撥公\n共基金外，區分所有權人應遵照區分所有權人會議議決之規定\n向管理委員會繳交下列款項：\n（一）公共基金。\n（二）管理費。\n二、管理費之收繳\n（一）管理費之分擔基準（請就下列四者勾選其一，未勾選者\n視為選擇 1.之情形）\n□1.各區分所有權人應按其共有之應有部分比例分擔\n之。\n□2.由各區分所有權人依照區分所有權人會議之決議\n分擔之。\n■3.各區分所有權人應按其建物登記總面積（不含停車\n位面積，房屋每坪新台幣捌拾伍元整（依本契約房\n屋銷售合計坪數計算），汽車停車位每位新台幣伍\n佰元整，持有機車停車位每位新台幣壹佰元整，本\n大樓之約定專用、空地、露台等均不計管理費。）\n計算以每坪每月定額分擔，停車位以每位每月定額\n分擔，定額之標準由區分所有權人會議決議訂定。\n□4.管理費之其他分擔方式： 。\n（二）管理費之收繳程序及支付方法，授權管理委員會訂定。\n（三）管理費收費標準依權狀發放面積為基準。\n（四）管理費以足敷"},{"id":"sec_67","title":"第十八條第二款開支為原則。","content":"三、公共基金之收繳\n（一）公共基金收繳基準（請就下列二者勾選其一，未勾選者\n\n視為選擇 1.之情形）\n■1.由各區分所有權人依照區分所有權人會議之決議\n收繳。\n□2.公共基金之其他收繳方式： 。\n（二）每年管理費之結餘，得經區分所有權人會議決議金額撥\n入。\n四、公共基金或管理費積欠之處理\n區分所有權人或住戶若在規定之日期前積欠應繳納之公共基\n金或應分擔或其他應負擔之費用，已逾二期（即二個收費期別）\n或積欠達新臺幣 萬元以上（含），經 天期間催告仍\n不給付者，管理負責人或管理委員會得訴請法院命其給付應繳\n之金額及遲延利息，遲延利息以未繳金額之年息 ％計算。\n五、共用部分及其基地使用收益，除區分所有權人會議另有決議\n外，撥入為公共基金保管運用。\n六、區分所有權人對於公共基金之權利應隨區分所有權之移轉而\n移轉；不得因個人事由為讓與、扣押、抵銷或設定負擔。"},{"id":"sec_68","title":"第十八條管理費、公共基金之管理及運用","content":"一、管理委員會為執行財務運作業務，應以管理委員會\n二、開設銀行或郵局儲金帳戶，公共基金與管理費應分別設專戶保\n管及運用。\n三、管理費用途如下：\n（一）委任或僱傭管理服務人之報酬。\n（二）共用部分、約定共用部分之管理、維護費用或使用償金。\n（三）有關共用部分之火災保險費、責任保險費及其他財產保\n險費。\n（四）管理組織之辦公費、電話費及其他事務費。\n（五）稅捐及其他徵收之稅賦。\n\n（六）因管理事務洽詢律師、建築師等專業顧問之諮詢費用。\n（七）其他基地及共用部分等之經常管理費用。\n四、公共基金用途如下：\n（一）每經一定之年度，所進行之計畫性修繕者。\n（二）因意外事故或其他臨時急需之特別事由，必須修繕者。\n（三）共用部分及其相關設施之拆除、重大修繕或改良。\n（四）供墊付前款之費用。但應由收繳之管理費歸墊。"},{"id":"sec_69","title":"第十九條重大修繕或改良之標準","content":"前條第三款第三目共用部分及其相關設施之拆除、重大修繕或改良\n指其工程金額符合：（請就下列四者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.新臺幣十萬元以上。\n□2.逾公共基金之百分之五。\n□3.逾共用部分、約定共用部分之一個月管理維護費用。\n□4.其他標準： 。"},{"id":"sec_70","title":"第二十條約定專用部分或約定共用部分使用償金繳交或給付","content":"共用部分之約定專用者或專有部分之約定共用者，除有下列情形之\n一者外，應繳交或給付使用償金：\n一、依與起造人或建築業者之買賣契約書或分管契約書所載已擁\n有停車空間持分者。\n二、依與起造人或建築業者之買賣契約書或分管契約書所載訂有\n使用該一共用部分或專有部分之約定者。\n三、登記機關之共同使用部分已載有專屬之停車空間持分面積\n者。\n前項使用償金之金額及收入款之用途，應經區分所有權人會議決議後為\n之。\n區分所有權人會議討論第一項使用償金之議案，得不適用"},{"id":"sec_71","title":"第十一條第二款提案之限制。","content":"第二 十 一 條 財務運作之監督規定\n一、 管理委員會之會計年度自每年 1 月 1 日起至每年 12 月 31\n日止。\n二、 管理委員會製作之公共基金餘額、會計憑證、會計帳簿、財\n務報表、欠繳公共基金與應分攤或其他應負擔費用情形、附\n屬設施設備清冊、固定資產與雜項購置明細帳冊（請就下列\n二者勾選其一，未勾選者視為選擇 1.之情形）\n■1.應經經辦人、財務委員、主任委員審核簽章。\n□2.應經經辦人、 委員、 委員、主任委員審核簽章。\n三、 會計帳簿應包含項目及內容如下：\n（一）收入明細：發生日期、科目、收入來源、金額。\n（二）支出明細：發生日期、科目、用途、支出對象、金額。\n四、 財務報表應包含項目及內容如下：\n（一）收入部分：表頭、期間、收入摘要、應收金額、實收\n金額、未收金額。\n（二）支出部分：表頭、期間、支出項目、金額。\n（三）收支狀況：前期結餘、總收入、總支出、結餘。\n（四）現金存款：公共基金銀行存款、管理費銀行存款、現\n金。\n五、 監察委員於區分所有權人會議應提出監督報告。\n六、 由管理委員會訂定財務之監督管理辦法，經區分所有權人會\n議決議為之。\n第五章 住戶共同遵守協定事項\n第二 十 二 條 住戶應遵守之事項\n一、於維護、修繕專有部分、約定專用部分或行使其權利時，不\n得妨害其他住戶之安寧、安全及衛生。\n二、他住戶因維護、修繕專有部分、約定專用部分或設置管線，\n\n必須進入或使用其專有部分或約定專用部分時，不得拒絕。\n三、管理負責人或管理委員會因維護、修繕共用部分或設置管\n線，必須進入或使用其專有部分或約定專用部分時，不得拒\n絕。\n四、於維護、修繕專有部分、約定專用部分或設置管線，必須使\n用共用部分時，應經管理負責人或管理委員會之同意後為\n之。\n五、專有部分之共同壁及樓地板或其內之管線，其維修費用由該\n共同壁雙方或樓地板上下方之區分所有權人共同負擔。但修\n繕費係因可歸責於區分所有權人之事由所致者，由該區分所\n有權人負擔。\n六、住戶不得任意棄置垃圾、排放各種污染物、惡臭物質或發生\n喧囂、振動及其他與此相類之行為。\n七、住戶不得於私設通路、防火間隔、防火巷弄、開放空間、退\n縮空地、樓梯間、共同走廊、防空避難設備等處所堆置雜物、\n設置柵欄、門扇或營業使用，或違規設置廣告物或私設路障\n及停車位侵占巷道妨礙出入。但開放空間及退縮空地，在直\n轄市、縣（市）政府核准範圍內，得依區分所有權人會議決\n議供營業使用；防空避難設備，得為原核准範圍之使用；其\n兼作停車空間使用者，得依法供公共收費停車使用。\n八、住戶為維護、修繕、裝修或其他類似之工作時，未經申請主\n管建築機關核准，不得破壞或變更建築物之主要構造。\n九、飼養動物之規定：（請就下列三者勾選其一，未勾選者視為\n選擇 1.之情形）\n■1.住戶飼養動物，不得妨礙公共衛生、公共安寧及公共安\n全，並授權管理委員會訂定飼養動物管理辦法。\n□2.住戶不得飼養動物。\n\n□3.飼養動物之其他規定： 。\n前項第二款至第四款之進入或使用，應擇其損害最少之處所\n及方法為之，並應修復或補償所生損害。\n第二 十 二 條之ㄧ 住戶室內裝修遵守之事項\n一、住戶如有下列室內裝修行為，應依建築物室內裝修管理\n辦法之規定，委託合法之室內裝修從業者設計及施工；\n經向主管建築機關申請審查許可，領得施工許可文件\n後，始得施工：\n（一）固著於建築物構造體之天花板裝修。\n（二）內部牆面裝修。\n（三）高度超過地板面以上一點二公尺固定之隔屏或\n兼作櫥櫃使用之隔屏裝修。\n（四）分間牆變更。\n二、 住戶於室內裝修施工前，應將施工許可文件張貼於施工地\n點明顯處。工程完竣後，應向主管建築機關申請核發室內\n裝修合格證明。\n三、室內裝修施工期間，為配合共用部分、約定共用部分之\n環境整潔及使用管理，住戶應（請就下列二者勾選其一，\n未勾選者視為選擇 1.之情形）\n□1.於施工前向管理委員會交付室內裝修工程具結書，\n並恪守所載規定。\n■2.本公寓大廈室內裝修時，遵守共用部分、約定共用\n部分之使用管理規定，其規定授權予管理委員會訂\n定實施。\n第二 十 三 條 投保火災保險之責任\n公寓大廈內依法經營餐飲、瓦斯、電焊或其他危險營業或存放有\n爆炸性或易燃性物品者。住戶應依中央主管機關所定保險金額投\n\n保公共意外責任保險。其因此增加其他住戶投保火災保險之保險\n費者，並應就其差額負補償責任。\n住戶未投保公共意外責任保險，經催告於七日內仍未辦理者，管\n理負責人或管理委員會應代為投保；其保險費、差額補償費及其\n他費用，由該住戶負擔。\n第二 十 四 條 其他事項\n一、共用部分及約定共用部分之使用管理事項，本規約未規定\n者，得授權管理委員會另定使用規則。\n二、區分所有權人資格有異動時，取得資格者應以書面提出登記\n資料。\n三、區分所有權人將其專有部分出租他人或供他人使用時，該承\n租者或使用者亦應遵守本規約各項規定。\n四、區分所有權人及停車空間建築物所有權者，應在租賃（或使\n用）契約書中載明承租人（或使用人）不得違反本規約之規\n定，並應向管理委員會提切結書。\n五、本規約中未規定之事項，應依公寓大廈管理條例、公寓大廈\n管理條例施行細則及其他相關法令之規定辦理。\n第六章 爭議事件及違反義務之處理\n第二 十 五 條 爭議事件之處理\n一、公寓大廈區分所有權人或住戶間發生有關公寓大廈爭議事\n件時，由管理委員會邀集相關當事人進行協調、或由當事人\n向直轄市、縣（市）政府公寓大廈爭議事件調處委員會申請\n調處或向鄉（鎮、市、區）公所調解委員會申請調解。\n二、有關區分所有權人、管理委員會或利害關係人間訴訟時，應\n以管轄本公寓大廈所在地之臺灣新北地方法院為第一審法\n院。\n\n第二 十 六 條 違反義務之處理\n一、區分所有權人或住戶有妨害建築物正常使用及違反共同利\n益行為時，管理委員會應按下列規定處理：\n（一）住戶違反公寓大廈管理條例"},{"id":"sec_72","title":"第六條第一項之規定，於","content":"維護、修繕專有部分、約定專用部分或行使權利時，\n有妨害其他住戶之安寧、安全及衛生情事；於他住戶\n維護、修繕專有部分、約定專用部分或設置管線，必\n須進入或使用其專有部分或約定專用部分時，有拒絕\n情事；於維護、修繕專有部分、約定專用部分或設置\n管線，必須使用共用部分時，應經管理負責人或管理\n委員會之同意後為之；經協調仍不履行時，得按其性\n質請求各該主管機關或訴請法院為必要之處置。管理\n委員會本身於維護、修繕共用部分或設置管線必須進\n入或使用該住戶專有部分或約定專用部分，有拒絕情\n事時，亦同。\n（二）住戶違反公寓大廈管理條例"},{"id":"sec_73","title":"第八條第一項之規定，有","content":"任意變更公寓大廈周圍上下、外牆面、頂樓平台及不\n屬專有部分之防空避難設備之構造、顏色、設置廣告\n物、鐵鋁窗或其他類似行為時，應予制止，經制止而\n不遵從者，應報請主管機關依公寓大廈管理條例第四\n十九條第一項規定處理，該住戶應於一個月內回復原\n狀，屆期未回復原狀者，由管理委員會回復原狀，其\n費用由該住戶負擔。\n（三）住戶違反公寓大廈管理條例"},{"id":"sec_74","title":"第十一條第二項之規定，","content":"對共用部分之使用未依設置目的及通常使用方法為\n之者，應予制止，並得按其性質請求各該主管機關或\n訴請法院為必要之處置。如有損害並得請求損害賠\n\n償。\n（四）住戶違反公寓大廈管理條例"},{"id":"sec_75","title":"第十五條第一項之規定，","content":"對於專有部分、約定專用部分之使用方式有違反使用\n執照及規約之規定時，應予制止，經制止而不遵從者，\n應報請直轄市、縣（市）主管機關處理，要求其回復\n原狀。\n（五）住戶違反公寓大廈管理條例"},{"id":"sec_76","title":"第十六條第一項至第四","content":"項之規定有破壞公共安全、公共衛生、公共安寧等行\n為時，應予制止，或召集當事人協調處理，經制止而\n不遵從者，得報請地方主管機關處理。\n二、住戶有下列各目之情事，管理委員會應促請區分所有權人或\n住戶改善，於三個月內仍未改善者，管理委員會得依區分所\n有權人會議之決議，訴請法院強制其遷離。而住戶若為區分\n所有權人時，亦得訴請法院命其出讓區分所有權及其基地所\n有權應有部分：\n（一）積欠依公寓大廈管理條例及規約規定應分擔費用，經\n強制執行再度積欠金額達其區分所有權總價百分之\n一者。\n（二）違反公寓大廈管理條例相關規定經依公寓大廈管理\n條例"},{"id":"sec_77","title":"第四十九條第一項第一款至第四款處以罰鍰後，","content":"仍不改善或續犯者。\n（三）其他違反法令或規約，情節重大者。\n三、前款強制出讓所有權於判決確定後三個月內不自行出讓並\n完成移轉登記手續者，管理委員會得聲請法院拍賣之。\n第七章 附則\n第二 十 七 條 利害關係人請求閱覽或影印\n利害關係人得提出書面理由請求閱覽或影印下列文件，管理負責\n\n人或管理委員會不得拒絕：\n一、 規約、公共基金餘額、會計憑證、會計帳簿、財務報表、欠\n繳公共基金與應分攤或其他應負擔費用情形、管理委員會會\n議紀錄及區分所有權人會議紀錄。\n二、 管理委員會保管之下列文件：\n本公寓大廈文件之保管及閱覽管理規定：（請就下列二者勾\n選其一，未勾選者視為選擇 1.之情形）\n■1.詳如公寓大廈規約範本內文件之保管及閱覽管理規定。\n□2.授權管理委員會訂定之。\n第二 十 八 條 繼受人之責任\n區分所有權之繼受人，應於繼受前向管理負責人或管理委員會請\n求閱覽或影印前條所定文件，並應於繼受後遵守原區分所有權人\n依公寓大廈管理條例或規約所定之一切權利義務事項。\n第二 十 九 條 催告與送達方式\n一、應行之催告事項，由管理負責人或管理委員會以書面為之。\n二、應行之送達：（請就下列二者勾選其一，未勾選者視為選擇\n1.之情形）\n■1.以投遞於區分所有權人或住戶向管理委員會登記之地址\n為之，未登記者則投遞於本公寓大廈之地址信箱或以公告\n為之。\n□2.其他送達方式： 。"},{"id":"sec_78","title":"第三十條其他事項","content":"一、共用部分及約定共用部分之使用管理事項，本規約未規定者，\n得授權管理委員會另定使用規則。\n二、區分所有權人資格有異動時，取得資格者應以書面提出登記資\n料。\n三、區分所有權人將其專有部分出租他人或供他人使用時，該承租\n\n者或使用者亦應遵守本規約各項規定。\n四、區分所有權人及停車空間建築物所有權者應在租賃（或使用）\n契約書中載明承租人（或使用人）不得違反本規約之規定，並\n應向管理委員會提出切結書。\n五、本規約中未規定之事項，應依本合約分管約定、公寓大廈管理\n條例、公寓大廈管理條例施行細則及其他相關法令之規定辦\n理。\n第三 十 一 條 本公寓大廈未組成管理委員會時，應推選管理負責人處理事務，\n並準用有關管理委員會應作為之規定。\n\n本戶平面示意圖\n附件（八）\n\n當層平面示意圖\n附件（八）\n\n一樓法定空地平面示意圖\n附件（九）\n\n一樓夾層平面示意圖\n附件（九）\n\n附件（九）\n二樓露臺平面示意圖\n\n三樓露臺平面示意圖\n附件（九）\n\n四樓露臺平面示意圖\n附件（九）\n\n十九樓露臺平面示意圖\n附件（九）\n\n二十樓露臺平面示意圖\n附件（九）\n\n地下一層示意圖\n附件（十）\n\n地下二層示意圖\n附件（十）\n\n附件（十）\n地下三層示意圖\n\n附件（十一）\n屋突一層示意圖\n\n附件（十一）\n屋突二層示意圖\n\n屋突三層示意圖\n附件（十一）\n\n附件（十二）\n建造執照影本\n\n附件（十二）\n建造執照影本(變更設計附表二)\n\n附件（十二）\n建造執照影本(變更設計附表二)\n\n不動產開發信託證明書及說明書\n附件（十三）\n\n附件（十三） 不動產開發信託說明書\n辦理「 不動產開發信託」預售屋買賣契約中應記載事項\n一、本預售案依內政部 99 年 12 月 29 日內授中辦地字第 0990725747 號公告\n『預售屋買賣定型化契約應記載事項履約保證機制補充規定』及『金融監\n督管理委員會 101 年 9 月 5 日金管銀票字第 10100274650 號函』辦理。\n二、本案土地、建造執照起造權利及興建資金已交付予台中商業銀行股份有限\n公司（以下稱受託銀行）信託管理，並依信託契約約定開立本案信託專戶，\n專款專用本案興建資金。有提供續建協助或未完工程續建機制。\n三、不動產開發信託之信託目的係在確保興建資金之專款專用，不具有「完工\n保證」或「價金返還保證」等之功能，買方就買賣契約之任何請求，應由\n賣方負最終履約責任。\n四、為保障買方之權益及配合受託銀行建置查詢網頁，賣方應徵取買方之書面\n同意將其個人資料及買賣契約資料提供予受託銀行，並同意於信託契約相\n關之特定目的範圍內，得為蒐集、處理、利用及揭露。但除法令、本注意\n事項規定或信託契約約定應予公開或揭露者外，受託銀行應負保密之責\n任。\n五、買方所繳價金，除直接匯（存）入信託專戶者外，賣方至遲應於收訖該筆\n價金之次一營業日交付信託。但不論前述任一方式，其信託關係僅存在於\n受託銀行與賣方，並非存在於受託銀行與買方，買方所繳價金於賣方交付\n信託後方為信託財產，未存入信託專戶之價金非屬信託財產，不受本信託\n契約之保障，就未存入信託專戶之價金所生之相關爭議應由買賣雙方自行\n協商。買方應於每次繳款後自行於受託銀行之查詢網頁查詢其所繳價金交\n付信託之明細，以確認其所繳價金是否已確實交付信託。查詢網址為：\n[http：//www.tcbbank.com.tw/]，查詢途徑為：[台中銀行首頁→信託服務查\n詢→預售屋收款信託專戶查詢（承購戶專區）]。買方對該網頁之資訊如有\n任何疑問，應逕洽賣方或受託銀行處理。\n六、賣方無法依約定完工或交屋時，買方對於可供分配信託財產之請求將因稅\n費、法定抵押權及抵押權等各項優先權利而受影響；買方就其未受償部分，\n應依買賣契約之約定向賣方請求。\n七、賣方無法依約定完工或交屋時，如受託人認為有需要通知預售屋買方召開\n受益權人會議之情形，其受益權人會議之召集事由、召集程序、議決方法、\n表決權之計算及其他應遵循事項如本契約受益權人會議規則（詳下列附件\n二）所載，賣方應將其定為買賣契約之一部分，與買賣契約有相同效力。\n\n附件（十四） 個人資料權益告知暨使用同意書\n丞石建 築開發有限公司（下稱本公司）依據《個人資料保護法》（以下稱《個資法》）、《個人資\n料保護法施行細則》等規定，向 臺端告知下列事項：\n1. 蒐集之目的：本公司基於不動產服務、行銷、住宅行政、契約、類似契約或其他法律關係事務、\n消費者、客戶管理與服務、票券業務、提供市場交易訊息及其他經營合於營業登記項目或組織\n章程所定之之範圍內，蒐集、處理及利用 臺端之個人資料。\n2. 蒐集之個人資料類別：本公司依前開特定目的，蒐集、處理及利用 臺端之個人資料，包括但\n不限於姓名、身分證字號、聯絡電話、服務單位、職稱、住址、工作地址、通訊及戶籍地址、\n電子郵遞地址、家庭成員狀況、財務及申請金融機構抵押貸款情況、社會活動及其他得以直接\n或間接方式識別該個人之資料，以及本公司提供相關不動產服務或與本公司履行不動產買賣\n契約之義務所需之個人資料； 臺端於不動產服務或買賣過程交付身份證明文件、財產資料或\n填載交由本公司或代銷公司執有書面文件內之個人資料；或依主管機關要求應提供之個人資\n料；或本公司基於與 臺端之不動產服務或買賣契約之履行，需向主管機關蒐集、調閱、取得\n之個人資料。\n3. 個人資料利用之期間、地區、對象及方式：\n3.1 期間：個人資料蒐集之特定目的存續期間/依相關法令規定或契約約定之保存年限（如：\n商業會計法等）/本公司因執行業務所必須之保存期間／ 臺端向本公司買受之不動產保\n固期限終止時止，惟因主管機關要求保留個人資料之年限，則自動延長至該年限屆滿時\n止；前開期間重疊者，適用較長之期間。\n3.2 地區：本公司將於臺灣地區利用 臺端之個人資料。\n3.3 對象：包括但不限於本公司、代銷公司、內政部營建署、不動產所在地之縣市政府主管建\n造執照、使用執照之局處、地政機關、財政部賦稅署及所屬機關、各級司法機關、建築師、\n承攬之營造廠商及其分包廠商、社區管理委員會、公用事業機構、地政士、及其他與本公\n司為履行與 臺端不動產服務或買賣相關之單位與個人等。\n3.4 方式：以書面或電子文件、電話、傳真或其他自動化或非自動化方式儲存、處理及利用。\n4. 依據個資法"},{"id":"sec_79","title":"第三條規定，臺端就本公司保有台端之個人資料得行使下列權利：","content":"4.1 臺端得向本公司查詢、請求閱覽或請求製給複製本，而本公司依法得酌收必要成本費用。\n4.2 臺端得向本公司請求補充或更正，惟依法應提出適當之釋明。\n4.3 臺端得向本公司請求停止蒐集、處理或利用及請求刪除，惟依法本公司因執行業務所必\n須時，得予以拒絕。\n5. 臺端不提供個人資料所致權益之影響：\n本公司蒐集、處理、利用上開個人資料時， 臺端可選擇不予提供個人資料或提供不完全，惟\n可能導致本公司無法進行必要處理作業，致無法提供 臺端相關服務；或依不動產買賣契約書履行\n出賣人義務或無法合法、及時有效保障 臺端權益，或恐使 臺端遭受主管機關之處罰。\n====================================================================\n經 貴公司向本人告知上開事項，本人已清楚瞭解 貴公司蒐集、處理或利用本人個人資料之目的\n及用途，並同意 貴公司對本人之個人資料有為蒐集、處理及利用之權利。\n受告知暨同意人：\n身"}]},{"doc":"土地預定買賣契約書","sections":[{"id":"intro","title":"契約前言","content":"分 證 字 號：\n地 址：\n中 華 民 國 年 月 日\n\n土 地 預 定 買 賣 契 約 書\n（以下簡稱買方）\n立契約書人\n（以下簡稱賣方）\n茲為『閱讀台灣』（以下簡稱「本社區」）所座落基地預定買賣事宜，經\n買、賣雙方同意訂立本土地預定買賣契約書（以下簡稱「本契約」）"},{"id":"sec_1","title":"第一條：契約審閱期","content":"本契約於中華民國 __ 年 月 日經買方攜回審閱 日\n（契約審閱期間不得少於五日）並詳加審約完畢。本契約內所有\n條款及雙方之權利義務內容、範圍，均經雙方溝通並經賣方說明\n後，買方對本契約所有條款及雙方之權利義務內容範圍確已充分\n瞭解並同意依約履行。經雙方協商後合意訂定條款如下，以資共\n同遵守：\n【買方簽章： 】\n【賣方簽章： 】"},{"id":"sec_2","title":"第二條：賣方對廣告之義務","content":"賣方應確保廣告內容之真實，本預售土地之廣告宣傳品及位置示意\n圖，為本契約之一部分。\n1"},{"id":"sec_3","title":"第三條：預定買賣標示","content":"本社區基地座落：新北市泰山區信華段五小段 43、43-1、43-2、\n46、47、48、49、50、51、59、60、60-1 地號等 12 筆土地，面積為\n6462.77 平方公尺（計 1954.99 坪），如因土地分割、合併或地籍\n圖重測，則依新地號、新面積辦理產權登記，實際面積以地政機\n關登載為準。使用分區為都市計畫第三種住宅區。"},{"id":"sec_4","title":"第四條：土地之出售面積及認定標準","content":"一、土地持分面積：\n買方所購買本社區編號第 棟 樓房屋，計壹戶，其\n土地持分面積為 點 平方公尺（ 點\n坪），應有權利範圍為萬分之 點 。計算\n方式係以專有部分面積 點 平方公尺\n（ 點 坪）占區分所有全部專有部分總面積\n22,249.02 平方公尺(6,730.33 坪)比例計算，如因土地分割、\n合併或地籍圖重測，則依新地號、新面積辦理所有權登記。\n二、第一項所列面積與地政機關登記面積有誤差時，買賣雙方應\n依"},{"id":"sec_5","title":"第五條規定互為找補。","content":""},{"id":"sec_6","title":"第五條：土地面積誤差及其價款找補","content":"一、土地面積以地政機關登記完竣之面積為準，依"},{"id":"sec_7","title":"第四條計算之土","content":"地面積其如有誤差，其不足部分賣方均應全部找補；其超過\n部分，買方只找補百分之二為限（至多找補不超過百分之\n二），且雙方同意面積誤差之找補以"},{"id":"sec_8","title":"第六條土地買賣總價款","content":"依土地面積誤差比例無息於交屋時互相找補。\n二、前項土地持分面積如有誤差超過百分之三者，買方得解除契\n約（房屋預定買賣契約書同時解除），因面積誤差而解除契\n約時，賣方應將買方已繳之款項無息全數退還，買方不得再\n請求任何損害賠償。\n2"},{"id":"sec_9","title":"第六條：契約總價","content":"一、本契約土地買賣總價款合計新台幣 仟 佰 拾\n萬元整（停車位不持分土地面積亦不計收土地價款）。\n上列土地價款亦不受物價波動之影響而有所增減。\n二、上列價款之各期付款方式如附件（一）「付款期別明細表」。\n第一項價款不包括暫收款之費用。"},{"id":"sec_10","title":"第七條：履約擔保機制","content":"本基地上所興建之預售屋應辦理履約保證，履約保證賣方依下列\n方式選擇不動產開發信託：\n▉不動產開發信託\n由賣方或起造人將建案土地及興建資金信託予台中商業銀行股\n份有限公司執行履約管理。興建資金應依工程進度專款專用。\n又簽定本約時，賣方應提供上開信託之證明文件或影本予買方\n詳附件（五）信託證明文件。\n□價金返還之保證\n本預售屋由（金融機構）負責承作價金返還保證。價金返還之\n保證費用由賣方負擔。\n賣方應提供第一項之保證契約影本予買方。\n□價金信託\n本預售屋將價金交付信託，由（金融機構）負責承作，設專款\n專用帳戶，並由受託機構於信託存續期間，按信託契約約定辦\n理工程款交付、繳納各項稅費等資金控管事宜。\n前項信託之受益人為賣方（即建方或合建雙方）而非買方，受\n託人係受託為賣方而非爲買方管理信託財產。但賣方無法依約\n定完工或交屋者，受益權歸屬於買方\n賣方應提供第一項之信託契約影本予買方。\n3\n□同業連帶擔保\n本公司與依公司章程規定得對外保證之○○公司（同業同級公\n司）等相互連帶擔保，賣方未依約定完工或交屋者，買方可持\n本契約向上列公司請求完成本建案後交屋。上列公司不得為任\n何異議，亦不得要求任何費用或補償。\n前項同業同級分級之基準，由內政部定之。\n賣方應提供連帶擔保之書面影本予買方。\n□公會辦理連帶保證協定\n本預售屋已加入由全國或各縣市不動產開發商業同業公會辦理\n之連帶保證協定，賣方未依約定完工或交屋者，買方可持本契\n約向加入本協定之○○公司請求共同完成本建案後交屋。加入\n本協定之○○公司不得為任何異議，亦不得要求任何費用或補\n償。\n賣方應提供加入前項同業聯合連帶保證協定之書面影本予買\n方。"},{"id":"sec_11","title":"第八條：付款條件","content":"一、除簽約款外，應依已完成之工程進度所定「付款期別明細\n表」附件（一）之規定於工程完工後繳款，其每次付款間隔\n日數應在二十日以上。如賣方未依工程進度定付款條件者，\n買方得於工程全部完工時一次支付之。\n二、買方應於接到賣方繳款通知七天內，由買方開立抬頭為『台\n中商業銀行股份有限公司收款信託專戶』之禁止背書轉讓即\n期支票予賣方或以現金、轉帳或匯款方式直接存入賣方指定\n之信託專戶。\n4\n銀 行：台中商業銀行股份有限公司 桃園分行\n戶 名：台中商業銀行股份有限公司收款信託帳戶\n銀行代碼：053\n帳 號：129-22-0005744\n契約編號：110020226\n貴戶之專屬繳款帳號：710-0573-226"},{"id":"sec_12","title":"第九條：逾期付款之處理方式","content":"一、買方如逾期達五日仍未繳清款項或已繳之票據無法兌現時，\n買方應加付按逾期繳款部分每日萬分之二單利計算之遲延利\n息，於補繳期款時一併繳付予賣方。\n二、如逾期二個月或逾使用執照核發後一個月不繳期款或遲延利\n息，經賣方以存證信函或其他書面催繳，經送達七日內仍未\n繳者，雙方同意依本契約"},{"id":"sec_13","title":"第十七條違約之處罰規定辦理，但","content":"前項情形賣方同意緩期支付者，不在此限。\n三、於前述情形，土地所有權如已移轉登記為買方名義時，買方\n應無條件將該土地所有權移轉返還登記予賣方或賣方指定之\n登記名義人，並於賣方通知解約之日起十日內，備齊移轉登\n記所需之文件及用印，其返還登記所需之費用由買方負擔。"},{"id":"sec_14","title":"第十條：土地所有權移轉登記期限","content":"一、土地所有權移轉登記\n土地所有權之移轉，除另有約定，依其約定者外，應於使用\n執照核發後四個月內備妥文件申辦有關稅費及權利移轉登\n記。其土地增值稅之負擔方式，依有關稅費負擔之約定辦\n理。\n二、賣方違反前款之規定，致各項稅費增加或罰鍰（滯納金）\n時，賣方應全數負擔；如損及買方權益時，賣方應負損害賠\n償之責。\n5\n三、賣方應於買方履行下列義務時，辦理土地所有權移轉登記：\n（一）依契約約定之付款辦法，除約定之交屋保留款外，應\n繳清土地所有權移轉登記前應繳全部之款項及逾期加\n付之遲延利息。\n（二）提出辦理所有權移轉登記及貸款有關文件，辦理各項\n貸款手續，預繳各項稅費，預立各項取款或委託撥付\n文件，並應開立受款人為賣方及票面上註明禁止背書\n轉讓，及記載擔保之債權金額及範圍之本票予賣方。\n（三）本項第一款、第二款之費用如以票據支付，應在登記\n以前全部兌現。\n四、本條第一項之辦理事項及貸款之相關抵押權設定，由賣方\n指定之地政士統一辦理之。買方應依賣方通知之期限內提\n供上述事項所需證件、印章及繳清各項稅費，買方如有辦\n理貸款，並應辦妥貸款相關手續，預立各項取款條或委託\n撥付文件或撥款同意書等文件手續，前開文件一經書立\n後，非經買方、賣方及銀行三方面之同意，不得撤銷本項\n委託或同意，並開立與本契約貸款金額同額之商業本票予\n賣方；但買方如未辦理貸款，仍應於賣方通知之期限內，\n開立附件（一）「付款期別明細表」預定金融貸款之同額商\n業本票予賣方。倘為配合各項手續需要，需由買方加蓋印\n章、出具證件或繳納各項稅費時，買方接獲賣方或承辦地\n政士通知日起七日內提供，如有逾期，每逾一日應按房地\n總價款依萬分之二單利計算遲延利息予賣方，另如因買方\n之延誤或不協辦，致各項稅費增加或罰鍰（滯納金）時，\n買方應全數負擔；如損及賣方權益時，買方應負全部損害賠\n償之責。\n五、買方同意簽立「代刻印章委託書」乙份，委託賣方代刻印章\n乙枚並負責保管，有關買方授權內容詳如附件（四）所示。\n6\n六、買方為未成年者，買方應於產權移轉前配合賣方或其指定地\n政士完成稅捐主管機關規定之贈與稅之申報、完稅程序。\n七、買方如未於賣方通知期限內履行本條約定，賣方得不辦理房\n屋所有權移轉登記。\n八、無其他違約事由，但若無理由或以不成立之理由透過口頭、\n書面或其他任何方式拒絕給付（包含但不限於拒絕撥付銀行\n貸款或其他款項，抑或是履行本條第三項之義務但又於產權\n過戶前表明拒絕過戶產權等等）者，賣方得停止或撤銷房地\n產權過戶手續。\n九、依公寓大廈管理條例"},{"id":"sec_15","title":"第四條之規定，買方不得要求所購買之","content":"房屋及其基地持分，分別移轉不同之所有權人。\n第 十 一 條：貸款約定\n一、委辦貸款：\n本約"},{"id":"sec_16","title":"第六條契約總價內之部分價款新臺幣仟佰","content":"拾 萬元整，由買方與賣方洽定之金融機構之貸款給\n付，買方應簽立「委辦貸款委託書」如附件（二），由買賣\n雙方依約定辦妥一切貸款手續。惟買方可得較低利率或有\n利於買方之貸款條件時，買方有權變更貸款之金融機構，\n自行辦理貸款，除享有政府所舉辦之優惠貸款利率外，買\n方應於賣方通知辦理貸款日起二十日內辦妥對保手續，並\n由承貸金融機構同意將約定貸款金額撥付賣方。委辦貸款\n應遵守事項如下：\n（一）買方同意以本戶房屋產權提供擔保，設定第一順位抵\n押權予賣方提供之金融機構辦理貸款，並於該金融機\n構對保及開戶時預立經簽章之取款條（取款條、存摺\n簿及取款密碼）及委託直接撥款同意書（撥款委託\n書）予賣方以憑辦理，且未經雙方及該金融機構三方\n7\n同意不得撤銷該委託直接撥款同意書。買方同時開立\n與貸款同額之擔保本票一紙予賣方，賣方於收到貸款\n後應返還買方。\n（二）買方同意於賣方通知對保日起算四十五日內完成該金\n融機構辦理貸款之撥款。\n（三）買方辦理金融機構貸款但減少貸款金額者，不足抵付\n本約附件（一）「付款期別明細表」房屋貸款時，該不\n足部分價款應依照本約附件（一）「付款期別明細表」\n如期先行給付房屋貸款。買方同意於賣方通知日起七日\n內，買方以現金一次匯入賣方指定之帳戶內。若買方未\n付清該價款前，賣方得拒絕辦理產權移轉登記予買方。\n（四）買方若因辦理貸款之條件不合，或已持有第二戶（含）\n以上之房屋者；或中途改變主意不貸款；或未依通知期\n限辦妥一切貸款手續；或主動向金融機構表明拒絕貸\n款、暫緩撥款、附帶任何條件或附帶期限撥款；或因買\n方之任何因素使賣方無法如期取得全部貸款者，視為買\n方不辦理貸款，依本條第三項辦理。\n（五）本條款所提供之金融機構係願配合本案辦理貸款作業，\n買方仍應自行向該金融機構洽詢相關規定，並同意金融\n機構之業務行為不得歸責於賣方。\n二、自洽貸款：\n前項預定辦理貸款之價款，買方若欲自洽金融機構辦理貸款以\n資抵付本約之房屋貸款者，買方應告知賣方擬自洽貸款之特\n定金融機構，並配合賣方辦理債權確保手續，應簽立附件\n（三）「自洽貸款協議書」，並遵守下列事項：\n（一） 買方同意以本戶房屋產權供擔保，設定第一順位抵押權\n予其自洽金融機構辦理貸款，並於抵押權設定前預立經\n簽章之取款條（取款條、存摺簿及取款密碼）及委託直\n8\n接撥款同意書（撥款委託書）予賣方以憑辦理，且未\n經雙方及該自洽金融機構三方同意不得撤銷該委託直接\n撥款同意書。買方同時開立與貸款同額之擔保本票一紙\n予賣方，賣方於收到貸款後應返還買方。\n（二） 買方辦理金融機構貸款但減少貸款金額者，不足抵付本\n約附件（一）「付款期別明細表」房屋貸款時，該不足\n部分價款應依照本約附件（一）「付款期別明細表」如\n期先行給付房屋貸款。買方同意於賣方通知日起七日\n內，買方以現金一次匯入賣方指定之帳戶內。若買方未\n付清該價款前，賣方得拒絕辦理產權移轉登記予買方。\n（三） 買方自洽金融機構辦理貸款（包括第一次購屋貸款、公\n教貸款、勞工貸款或其他優惠貸款）者，除應自行向該\n金融機構瞭解貸款條件（貸款人身份、擔保物使用用\n途、貸款金額），並同意金融機構之業務行為不得歸\n責於賣方。\n（四） 買方同意相關抵押權設定手續由賣方指定之地政士統\n籌辦理。\n三、不辦理貸款：\n買方不辦理金融機構貸款者，該部分價款應依照附件（一）\n「付款期別明細」如期如數給付賣方。買方於接獲賣方書面\n掛號繳款通知單七日內（依郵局第一次投遞日期為通知日）\n如期如數給付賣方，以現金匯入賣方指定帳戶內，一次繳清\n銀行貸款之金額，以為給付。由賣方指定之地政士辦理有關\n稅費申報。若買方未付清本期價款前，賣方得拒絕辦理產權\n移轉登記予買方，並依本約"},{"id":"sec_17","title":"第九條約定處理。","content":"四、前項由賣方洽定辦理之貸款金額少於預定貸款金額，其差額\n依下列各款處理：\n（一）不可歸責於雙方時之處理方式如下：\n9\n1. 差額在預定貸款金額百分之三十以內者，賣方同\n意以原承諾貸款相同年限及條件由買方分期清\n償。\n2. 差額超過原預定貸款金額百分之三十者，賣方同意\n依原承諾貸款金額之利率計算利息，縮短償還期\n限為 年（期間不得少於七年），由買方按月\n分期攤還。\n3. 差額超過原預定貸款金額百分之三十者，買賣雙\n方得選擇前述方式辦理或解除契約。\n（二）可歸責於賣方時，差額部分，賣方應依原承諾貸款相\n同年限及條件由買方分期清償。如賣方不能補足不足\n額部分，買方有權解除契約。\n（三） 可歸責於買方時，買方應於接獲通知之日起 天\n（不得少於三十天）內一次給付其差額或經賣方同意\n分期給付其差額。\n五、買方充分認知預定貸款金額係為本契約應繳總價之一部分，\n屬賣方應收之價款，並非交屋保留款及尾款，買方同意於金\n融機構貸款核准後及於賣方完成產權移轉至買方名下之給付\n義務時，買方之對待給付義務即為支付預定貸款金額，由金\n融機構當日撥入賣方指定之金融機構帳戶，以資抵付預定貸\n款金額。\n六、有關金融機構核撥貸款後之利息，由買方負擔。但於賣方通\n知之交屋日前之利息應由賣方返還買方。\n第 十 二 條：貸款撥付\n本契約有貸款約定者，於產權登記完竣並由金融機構設定抵押權\n後，除有違反房屋契約書"},{"id":"sec_18","title":"第十二條第二項、第三項或其他縱經修","content":"繕仍無法達到應有使用功能之重大瑕疵外，買方不得通知金融機\n構終止撥付貸款金額予賣方。\n10\n第 十 三 條：土地轉讓條件\n一、買方繳清已屆滿之各期應繳款項者，於本契約土地所有權移\n轉登記完成前，不得將本契約讓與或轉售與第三人，並不得\n以第三人為登記名義人。但配偶、直系血親或二親等內旁系\n血親間之讓與或轉售；或其他中央主管機關公告得讓與或轉\n售之情形並經直轄市、縣（市）主管機關核准者，不在此\n限。\n二、買方如欲依前款但書規定，將本契約讓與或轉售他人時，必\n須事先以書面徵求賣方同意，賣方非有正當理由不得拒絕。\n三、前項之讓與或轉售，除配偶、直系血親或二親等內旁系血親\n間之讓與或轉售，免手續費外，賣方得向買方收取本契約房\n地總價款萬分之 （最高以萬分之五為限）之手續費。其\n因而產生之各項稅費由買方負擔。且出讓人與受讓人均對本\n契約負有連帶履行保證責任。\n第 十 四 條：地價稅之分攤比例\n地價稅以賣方通知書所載之交屋日為準，該日期前由賣方負擔，\n該日期後由買方負擔，其稅期已開始而尚未開徵者，則依前一年\n度地價稅單所載該宗基地課稅之基本稅額，按持分比例及年度日數\n比例分算賣方應負擔之稅額，由買方應給付賣方之買賣尾款中\n扣除，俟地價稅開徵時由買方自行繳納。\n第 十 五 條：稅費負擔之約定\n一、土地增值稅應於使用執照核發後申報，並以使用執照核發日\n之當年度公告現值計算增值稅，其逾三十日申報者，以提出\n申報日當期之公告現值計算增值稅，由賣方負擔，但買方未\n依"},{"id":"sec_19","title":"第九條規定備妥申辦文件，其增加之增值稅，由買方負","content":"擔。\n11\n二、辦理本戶土地所有權移轉及貸款抵押設定登記登記規費、印\n花稅、地政士代辦手續費、代書費及各項規費、實價登錄\n費、貸款保險費及各項附加稅捐由買方負擔。\n三、公證費由雙方各負擔二分之一。但另有約定者從其約定。\n四、 本條所列買方應繳之各項稅費（所有權移轉登記規費、印花\n稅、代辦手續費、貸款保險費及各項附加稅捐等），無論該\n單據抬頭為何人，均應由買方負擔，買方應依賣方指定期限內\n預繳予賣方，待買方辦理正式交屋手續時結清，雙方同意多退\n少補，並由買方領回相關正式單據。\n五、買方未於賣方通知期限內預繳本條所列之費用致發生怠報或\n滯納之違規情事者，其因此而增加費用，由買方負擔。\n第 十 六 條：賣方之瑕疵擔保責任\n一、 賣方保證產權清楚，絕無一物數賣、無權占有他人土地、承\n攬人依民法"},{"id":"sec_20","title":"第五百十三條行使法定抵押權或設定他項權利等","content":"情事之一；如有上述情形，賣方應於本戶交屋日或其他約定\n之期日 日前負責排除塗銷之。本契約有利買方者，從\n其約定之。\n二、 有關本契約標的物之瑕疵擔保責任，除本契約另有約定\n外，悉依民法及其他有關法令規定辦理。\n第 十 七 條：違約罰則\n一、賣方違反「賣方之瑕疵擔保責任」之規定者，即為賣方違\n約，買方得依法解除契約。\n二、買方依第一項解除契約時，賣方除應將買方已繳之房地價款\n退還予買方，如有遲延利息應一併退還，並應同時賠償房地\n買賣總價款百分之 （不得低於百分之十五）之違約\n金。但該賠償之金額超過買方已繳價款者，則以買方已繳價\n款為限。\n12\n三、買方違反有關「付款條件及方式」之規定者，賣方得沒收依\n房地買賣總價款百分之 （最高不得超過百分之十五）\n計算之金額。但該沒收之金額超過已繳價款者，則以已繳價\n款為限，買賣雙方並得解除本契約。\n四、買賣雙方當事人除依前二項之請求外，不得另行請求其他損\n害賠償。\n第 十 八 條：土地點交\n一、本預定買賣之土地，雙方同意應與本契約併同簽署生效之\n「房屋預定買賣契約書」各項規定之期限方式辦理點交，並\n依該條款之精神履行各約定義務。\n二、本預定買賣土地辦妥產權登記，且買方業已全部履行本契約\n及併同簽定之「房屋預定買賣契約書」之內容後，賣方應將\n土地所有權狀交付買方。\n三、本約土地（房屋持分）系持分所有，以辦理交屋手續時交付\n土地權狀視同基地持分之點交。\n四、法定空地之使用方式為全體區分所有權人共有，不得要求法\n定空地之點交或將法定空地讓售於特定人或為區分所有權人\n以外特定人設定專用使用權或為其他有損害區分所有權人權\n益之行為。\n第 十 九 條：買賣權益特約條款\n一、 買方為辦理本契約土地產權登記及一切本契約相關手續，\n同意賣方代刻印章申辦，並簽立「代刻印章委託書」詳附\n件（四）。\n二、 本契約之一切規定對雙方權利義務之受讓人、繼承人或管理\n人、受贈人、承租人具同等約束力，且不得以各方或前手間\n之原因作為抗辯之事由；如買方為未成年人，應由其法定代理\n人簽約或由其法定代理人出具書面同意予賣方後始得簽\n13\n約，其法定代理人對買方依本契約所載之一切義務負連帶\n責任（適用民法連帶債務之規定）。\n第 二 十 條：質押禁止\n除本契約另有約定外，買方同意不以基於本契約所取得之權利提供\n予第三人做為擔保或質押，否則即視為買方違約，其因此所造成\n賣方之損害應由買方負責賠償。如因買方與第三人發生糾紛，致\n買方基於本契約所取得之權利或金融貸款為第三人假扣押、假處\n分或遭其他強制執行處分時，買方並須負賣方因而所受之損害賠\n償責任。"},{"id":"sec_21","title":"第二十一條：共同承買約定","content":"一、 本契約如有共同承買者，除對本契約之買方義務共同負連\n帶責任外，並應指定一人（姓名： ）為送達\n代收人，賣方依本契約向買方所為之通知或意思表示以送\n達至送達代收人為合法送達，對買方全體均生合法送達之\n效力。\n二、 買方如為數人者，買方願就本契約應繳付價款、稅費及其應\n履行之義務，均負連帶給付責任。\n14"},{"id":"sec_22","title":"第二十二條：通信送達之方式","content":"買、賣雙方相互所為之徵詢、洽商或通知辦理事項，均應以書面\n按本契約所載之地址以掛號或存證信函付郵為之，買方如有變更\n地址或連絡處所，應即以書面掛號通知賣方變更，如因拒收或無\n人收受而致退回或無法送達者，雙方同意以郵局第一次投遞日視\n為送達日期。"},{"id":"sec_23","title":"第二十三條：契約及其相關附件效力","content":"一、 本契約自簽約日起生效，本契約一式兩份，由買賣雙方各執\n乙份為憑，本契約之附件視為本契約之一部分，與本契約\n具同等效力，雙方均應共同遵守履行，如有任何一部分不予\n履行時，均視同違約。\n二、本契約簽訂後，如政府預售屋合約換約之規範有變更修改\n者，雙方同意遵守修法後之法律。\n三、 買方與本契約投資興建之丞石建築開發有限公司簽訂之\n「房屋預定買賣契約書」約定，雙方同意該契約書與本契約\n有密不可分之並存關係，任何一契約違約或解除時，其他另\n一契約亦同其效力。\n四、基於房屋與基地應共同出售且實質上為同一權利單位關係，\n若於土地買賣契約中另有本契約未約定而解釋上不宜分別房\n屋與基地而適用者，房屋部分應準用之。\n五、本契約之土地買賣相關事項，賣方全權委託「丞石建築開發\n有限公司」與買方簽訂本契約，凡就本買賣所為之銷售、簽\n約、催告通知、收款、抵押貸款、產權移轉等相關事由均全\n部委託丞石建築開發有限公司代為處理，不另立授權書。為\n維護交易安全及安定性，賣方同意於履約期間不得終止對丞\n石建築開發有限公司之委託。\n六、本契約書之附件及附圖為本契約之一部份，與本契約具有同\n15\n等效力。買賣雙方同意免蓋騎縫章仍不影響本契約效力。"},{"id":"sec_24","title":"第二十四條：留置權約定","content":"買方於尚未付清價款、遲延利息、滯納金、違約金或各項稅費及\n完成交屋手續之前，賣方或其指定之地政士，對於買方之各項相關\n產權憑證及土地、建物之相關從物如鑰匙等有留置之權，買方充\n分認知。"},{"id":"sec_25","title":"第二十五條：管轄法院","content":"本契約若有未盡事宜，依有關法令規定辦理，如有涉訟則以臺灣\n新北地方法院為第一審管轄法院。\n上開契約事項已明列本契約中，係經雙方同意，其他任何口頭承諾、片面承諾\n或約定概不生效，恐口無憑，特立本契約書一式兩份，雙方各執一份為憑。\n本契約附件：\n（一） 付款期別明細表。\n（二） 委辦貸款委託書。\n（三） 自洽貸款協議書。\n（四） 代刻印章委託書。\n（五） 不動產開發信託證明書及說明書。\n（六） 個人資料權益告知暨使用同意書。\n16\n立契約書人\n買 方：\n身分證字號：\n戶 籍 地 址： 縣（市） 鄉（鎮市區） 村（里） 鄰\n路（街） 段 巷 弄 號 樓之 。\n通 訊 地 址：□同戶籍地。\n縣（市） 鄉（鎮市區） 村（里） 鄰\n路（街） 段 巷 弄 號 樓之 。\n連 絡 電 話：\n賣 方：\n身分證字號：\n地 址：台北市松山區南京東路四段 16號 10樓\n連 絡 電 話：02-2771-3778\n不動產經紀業：大可廣告有限公司\n代 表 人：彭智祺\n統 一 編 號： 83251684\n地 址：台北市松山區南京東路四段 16號 10樓\n不動產經紀人：彭賢春\n經紀人證照號：（98）桃市經字第 001031號\n中 華 民 國 年 月 日\n17\n付款期別明細表\n附件（一）\n付 款 別 期款比例 土 地 款（新台幣）\n訂金 仟 佰 拾 萬元整\n１２％\n簽約金 仟 佰 拾 萬元整\n一樓底板完成 ２％ 仟 佰 拾 萬元整\n十樓底板完成 ２％ 仟 佰 拾 萬元整\n屋頂板完成 ２％ 仟 佰 拾 萬元整\n外

飾完成 １％ 仟 佰 拾 萬元整\n取得使用執照 １％ 仟 佰 拾 萬元整\n銀行貸款 ７５％ 仟 佰 拾 萬元整\n交屋保留款 ５％ 仟 佰 拾 萬元整\n總價款 １００％ 仟 佰 拾 萬元整\n■ 買方依付款明細表約定，按期如數給付現金予賣方。\n■ 本付款明細表之期別時間點，依實際建築興建工程之進度日期為主，不可歸\n咎於銷售現場預估進度時間而拒絕（或延遲）如期繳納。\n18\n委辦貸款委託書\n附件（二）\n立委託書人 （以下簡稱買方）茲因向\n（以下簡稱賣方）購買座落：新北市泰山區信華段五小段 43、43-1、43-2、\n46、47、48、49、50、51、59、60、60-1 等地號 12 筆土地之「閱讀台灣」\n棟 樓，共計壹戶。買方就上項不動產產權為擔保物，委託賣方為\n向賣方指定金融機構辦理抵押貸款，經雙方同意簽訂條如下，以茲共同遵守：\n一、 本約委辦貸款金額為新台幣 仟 佰 拾 萬元整，買方\n同意於賣方通知期限內，委由賣方或賣方指定之土地登記地政士代辦\n貸款之手續，買方應於辦理銀行貸款對保手續之同時簽立撥款委託書\n予賣方及指定金融機構各持壹份，並同意於貸款核准產權登記完成後\n由貸款銀行直接撥入賣方指定之銀行帳戶，作為買方給付買賣總價金\n之部分價款。倘因政府法令或金融機構貸款政策改變或因買方個人之\n因素，即應具備之貸款手續有瑕疵，由於不可歸於賣方之因素，致不\n能獲得貸款或貸款金額未達申請之金額時，賣方以書面通知買方，買\n方應於接到賣方通知七日內（其通知日以郵戳為憑）將貸款金額連同\n利息以現金一次付清予賣方，買方如逾期不付者，即視同違約。\n二、買方對於前項銀行貸款金額，同意對保時簽立同額之商業本票交付賣\n方，做為付款之擔保，賣方於取得貸款價金後，交屋時返還之。\n三、買方同意提供本約標示之土地作為抵押物，辦理第一順位抵押權設定\n登記予貸款銀行並依貸款銀行之一切貸款規定，配合辦理貸款手續。\n四、本約申貸之金額、期限、利率償還方式，買方應遵守貸款銀行之決\n定，並應於賣方通知或依貸款銀行之規定，辦理貸款手續。\n五、本約之委辦貸款，及抵押權設定事項，如需買方及買方保證人親自出\n面或補具有關證件時，買方應依賣方之通知日期出面辦理或如期提\n供，絕不拖延或拒絕，否則視為不貸款，依本契約"},{"id":"sec_26","title":"第十一條第三項之","content":"約定辦理。\n六、前項手續所產生之規費、手續費、地政士費各項費用由買方自行負\n19\n擔。買方應於賣方通知辦理銀行貸款對保及用印時由賣方先行預收，\n並於交屋時按實際單據多退少補。\n七、本約簽訂後，如未經賣方之同意，買方不得向貸款銀行片面為撤銷、\n變更、停止或遲延撥付貸款之行為。\n立委託書人\n買 方：\n身分證統一編號：\n賣 方：\n身分證字號：\n地 址：台北市松山區南京東路四段 16號 10樓\n連 絡 電 話：02-2771-3778\n中 華 民 國 年 月 日\n20\n自洽貸款協議書\n附件（三）\n立協議書人 （以下簡稱買方）茲向\n（以下簡稱賣方）購買座落：新北市泰山區信華段五小段 43、43-1、\n43-2、46、47、48、49、50、51、59、60、60-1 地號等 12筆土地之「閱\n讀台灣」 棟 樓，共計壹戶。買方就上項不動產產權為擔保物，擬自\n行向金融機構洽辦貸款，請賣方配合辦理貸款手續，特立此協議書以茲共同\n遵守：\n一、 買方預定自洽土地貸款之總金額為新台幣 仟 佰 拾\n萬元整，貸款核撥後作為支付買賣契約約定之部分價款。\n二、買方認知並同意，賣方係基於服務之立場協助買方辦理自洽貸款，故\n不論買方因何理由無法獲貸，概與賣方無涉，買方仍應依約繳付價\n款。另為確保賣方權益，買方及其自洽貸款金融機構應同意前開土地\n之產權登記與抵押權設定手續同時辦理。\n三、買方辦理自洽貸款時，為維護賣方收取價金之權益，應遵守下列約定\n事項：\n（一）買方應於賣方通知日起算七日內來文告知其自洽之承貸銀行，\n並配合賣方辦理債權確保手續。\n（二）買方應於建物使用執照核發之日起十五日內，簽付撥款委託書\n予賣方及指定之金融機構各壹份，並應交付與上開貸款同額之取\n款條（或同性質之書據）暨存摺予賣方，於貸款核准後，賣\n方即可向承貸金融機構領取，或撥入賣方指定之銀行帳戶，\n做為買方購買賣方土地應繳付之部份價款。\n（三）買方自洽貸款少於土地貸款之總金額或承貸銀行之實際放款金\n額少於自洽貸款擬貸金額時，買方承貸銀行向賣方確認核貸金\n後，買方同意於賣方通知日起算七日內，買方以現金一次給付\n賣方。\n（四）買方如有中途改變主意不貸、貸款之條件不合、通知金融機構\n21\n暫緩撥款或依本書約定視為放棄貸款之情事，應依「"},{"id":"sec_27","title":"第十一條：貸款約定第一項或第三項」之約定辦理，以抵付購買上項","content":"不動產應繳之價款。否則賣方除得依本約有關違約之處罰辦\n理。\n（五）買方承貸銀行核准撥款時，如因買方欠繳保險費或未辦保險，\n致賣方無法領取貸款時，賣方得代為繳納或辦理，再向買方收\n取相關費用，買方絕無異議。\n（六）本協議書未載明事項仍應依本約「"},{"id":"sec_28","title":"第十一條：貸款約定第二","content":"項」履行之。\n本協議書簽定後如未經賣方之同意，買方不得片面向貸款金融機構為任何停止\n或撤銷或遲延撥付之表示，否則即視為買方不辦理貸款，依本約「"},{"id":"sec_29","title":"第十一條：","content":"貸款約定第三項」之約定辦理。\n22\n立協議書人\n買 方：\n身分證統一編號：\n賣 方：\n身分證字號：\n地 址：台北市松山區南京東路四段 16號 10樓\n連 絡 電 話：02-2771-3778\n中 華 民 國 年 月 日\n23\n代刻印章委託書\n附件（四）\n立委託書人： （以下簡稱買方）\n受 託 人： （以下簡稱賣方）\n雙方因委託代刻印章及授權使用事宜，切結約定如下：\n一、買方同意賣方或指定之地政士代刻印章壹枚保管及使用，賣方並應於交屋\n時交還買方。\n二、本印章賣方僅得使用於下列相關用途：\n（一）本契約土地產權移轉登記及貸款抵押權設定登記之申請、變更或撤\n銷另本約所提及及應用印本項亦屬之。\n（二）銀行對保開戶及領取貸款、申報實價登錄。\n（三）稅捐申報、撤銷、水、電、瓦斯、電信之申請或變更。\n（四）有關本土地領用各項文件之使用。\n三、賣方不得將前項授權印章使用於本同意書以外之任何用途，否則賣方須負\n法律責任。\n四、買、賣雙方如有糾紛，雙方同意不得影響本同意書"},{"id":"sec_30","title":"第二條各項用途之印章","content":"使用，雙方同意依民事訴訟程序解決此類糾紛而不得影響本項授權之成立\n。\n五、立同意書人係於簽定「土地預定買賣契約書」之同時本於自由意志、誠實\n信用之原則製作及充份瞭解後立同意書存查。\n24\n立委託書人\n買 方：\n身分證統一編號：\n賣 方：\n身分證字號：\n地 址：台北市松山區南京東路四段 16號 10樓\n連 絡 電 話：02-2771-3778\n中 華 民 國 年 月 日\n25\n不動產開發信託證明書及說明書\n附件（五）\n26\n27\n28\n附件（五） 不動產開發信託說明書\n辦理「不動產開發信託」預售屋買賣契約中應記載事項\n一、 本預售案依內政部 99 年12 月29 日內授中辦地字第 0990725747 號公告『預\n售屋買賣定型化契約應記載事項履約保證機制補充規定』及『金融監督管\n理委員會 101年9月 5日金管銀票字第10100274650號函』辦理。\n二、本案土地、建造執照起造權利及興建資金已交付予台中商業銀行股份有限\n公司（以下稱受託銀行）信託管理，並依信託契約約定開立本案信託專\n戶，專款專用本案興建資金。有提供續建協助或未完工程續建機制。\n三、不動產開發信託之信託目的係在確保興建資金之專款專用，不具有「完工\n保證」或「價金返還保證」等之功能，買方就買賣契約之任何請求，應由\n賣方負最終履約責任。\n四、為保障買方之權益及配合受託銀行建置查詢網頁，賣方應徵取買方之書面\n同意將其個人資料及買賣契約資料提供予受託銀行，並同意於信託契約相\n關之特定目的範圍內，得為蒐集、處理、利用及揭露。但除法令、本注意\n事項規定或信託契約約定應予公開或揭露者外，受託銀行應負保密之責\n任。\n五、買方所繳價金，除直接匯（存）入信託專戶者外，賣方至遲應於收訖該筆\n價金之次一營業日交付信託。但不論前述任一方式，其信託關係僅存在於\n受託銀行與賣方，並非存在於受託銀行與買方，買方所繳價金於賣方交付\n信託後方為信託財產，未存入信託專戶之價金非屬信託財產，不受本信託\n契約之保障，就未存入信託專戶之價金所生之相關爭議應由買賣雙方自行\n協商。買方應於每次繳款後自行於受託銀行之查詢網頁查詢其所繳價金交\n付信託之明細，以確認其所繳價金是否已確實交付信託。查詢網址為：\n[http://www.tcbbank.com.tw/]，查詢途徑為：[台中銀行首頁→信託服務查\n詢→預售屋收款信託專戶查詢（承購戶專區）]。買方對該網頁之資訊如有\n任何疑問，應逕洽賣方或受託銀行處理。\n六、賣方無法依約定完工或交屋時，買方對於可供分配信託財產之請求將因稅\n29\n費、法定抵押權及抵押權等各項優先權利而受影響；買方就其未受償部\n分，應依買賣契約之約定向賣方請求。\n七、賣方無法依約定完工或交屋時，如受託人認為有需要通知預售屋買方召開\n受益權人會議之情形，其受益權人會議之召集事由、召集程序、議決方\n法、表決權之計算及其他應遵循事項如本契約受益權人會議規則（詳下列\n附件二）所載，賣方應將其定為買賣契約之一部分，與買賣契約有相同效\n力。\n30\n31\n32\n33\n34\n附件六 個人資料權益告知暨使用同意書\n本建案依據《個人資料保護法》（以下稱《個資法》）、《個人資料保護法施行細則》等規定，向 臺端告\n知下列事項：\n1. 蒐集之目的：本建案基於不動產服務、行銷、住宅行政、契約、類似契約或其他法律關係事務、消費者、\n客戶管理與服務、票券業務、提供市場交易訊息及其他經營合於營業登記項目或組織章程所定之之範圍內，\n蒐集、處理及利用 臺端之個人資料。\n2. 蒐集之個人資料類別：本建案依前開特定目的，蒐集、處理及利用 臺端之個人資料，包括但不限於姓\n名、身分證字號、聯絡電話、服務單位、職稱、住址、工作地址、通訊及戶籍地址、電子郵遞地址、家庭\n成員狀況、財務及申請金融機構抵押貸款情況、社會活動及其他得以直接或間接方式識別該個人之資料，以\n及本建案提供相關不動產服務或與本建案履行不動產買賣契約之義務所需之個人資料； 臺端於不動產服\n務或買賣過程交付身份證明文件、財產資料或填載交由本建案或代銷公司執有書面文件內之個人資料；或\n依主管機關要求應提供之個人資料；或本建案基於與 臺端之不動產服務或買賣契約之履行，需向主\n管機關蒐集、調閱、取得之個人資料。\n3. 個人資料利用之期間、地區、對象及方式：\n3.1 期間：個人資料蒐集之特定目的存續期間／依相關法令規定或契約約定之保存年限（如：商業會\n計法等）／本建案因執行業務所必須之保存期間／ 臺端向本建案買受之不動產保固期限終止時止，\n惟因主管機關要求保留個人資料之年限，則自動延長至該年限屆滿時止；前開期間重疊者，適用較\n長之期間。\n3.2 地區：本建案將於臺灣地區利用 臺端之個人資料。\n3.3 對象：包括但不限於本建案、代銷公司、內政部營建署、不動產所在地之縣市政府主管建造執照、使用執\n照之局處、地政機關、財政部賦稅署及所屬機關、各級司法機關、建築師、承攬之營造廠商及其分\n包廠商、社區管理委員會、公用事業機構、地政士、及其他與本建案為履行與 臺端不動產服務或\n買賣相關之單位與個人等。\n3.4 方式：以書面或電子文件、電話、傳真或其他自動化或非自動化方式儲存、處理及利用。\n4. 依據個資法第3條規定， 臺端就本建案保有 臺端之個人資料得行使下列權利：\n4.1 臺端得向本建案查詢、請求閱覽或請求製給複製本，而本建案依法得酌收必要成本費用。\n4.2 臺端得向本建案請求補充或更正，惟依法應提出適當之釋明。\n4.3 臺端得向本建案請求停止蒐集、處理或利用及請求刪除，惟依法本建案因執行業務所必須時，得\n予以拒絕。\n5. 臺端不提供個人資料所致權益之影響：\n本建案蒐集、處理、利用上開個人資料時， 臺端可選擇不予提供個人資料或提供不完全，惟可能導\n致本建案無法進行必要處理作業，致無法提供 臺端相關服務；或依不動產買賣契約書履行出賣人義務\n或無法合法、及時有效保障 臺端權益，或恐使 臺端遭受主管機關之處罰。\n=====================================================================\n經 貴公司向本人告知上開事項，本人已清楚瞭解 貴公司蒐集、處理或利用本人個人資料之目的及用途，\n並同意 貴公司對本人之個人資料有為蒐集、處理及利用之權利。\n受告知暨同意人：\n身 分 證 字 號：\n地 址：\n中 華 民 國 年 月 日\n35"}]}];

    card.className = 'amendment-card';

    // before/after html 已含 <del>/<ins>，直接 render（信任內部資料）

          <span class="amendment-badge ${isLand ? 'badge-land' : 'badge-house'}">${item.category}</span>

function scrollToAmendment(id) {

// ─── RENDER CONTRACT ───
function renderContract(doc, sidebarId, contentId) {
  const sidebar = document.getElementById(sidebarId);
  const content = document.getElementById(contentId);
  sidebar.innerHTML = '';
  content.innerHTML = '';

  const headerEl = document.createElement('div');
  headerEl.className = 'toc-section-header';
  headerEl.textContent = doc.doc;
  sidebar.appendChild(headerEl);

  doc.sections.forEach((sec, idx) => {
    // TOC item
    const tocBtn = document.createElement('button');
    tocBtn.className = 'toc-item';
    tocBtn.textContent = sec.title.length > 22 ? sec.title.substring(0,22) + '…' : sec.title;
    tocBtn.dataset.secId = sec.id;
    tocBtn.addEventListener('click', () => scrollToSection(sec.id, contentId, sidebarId));
    sidebar.appendChild(tocBtn);

    // Content card
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'sec-' + sec.id + '-' + contentId;
    card.dataset.searchText = (sec.title + sec.content).toLowerCase();
    card.innerHTML = `
      <div class="section-title">
        <span class="section-num">${idx + 1}.</span>
        <span>${escapeHtml(sec.title)}</span>
      </div>
      <div class="section-content">${escapeHtml(sec.content)}</div>
    `;
    content.appendChild(card);
  });

  // Observe scroll for TOC highlight
  setupScrollObserver(content, sidebar);
}

function scrollToSection(secId, contentId, sidebarId) {
  const el = document.getElementById('sec-' + secId + '-' + contentId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setupScrollObserver(contentEl, sidebarEl) {
  const cards = contentEl.querySelectorAll('.section-card');
  const tocItems = sidebarEl.querySelectorAll('.toc-item');

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        tocItems.forEach(t => {
          const secId = t.dataset.secId;
          const matches = id.includes(secId);
          t.classList.toggle('active', matches);
          if (matches) t.scrollIntoView({ block: 'nearest' });
        });
      }
    });
  }, { root: contentEl, threshold: 0.2, rootMargin: '-10% 0px -60% 0px' });

  cards.forEach(c => obs.observe(c));
}

  // ── land ──
  let countLand = 0;
  document.querySelectorAll('#content-land .section-card').forEach(card => {
    const match = card.dataset.searchText.includes(searchQuery);
    card.classList.toggle('hidden', !match);
    if (match) { countLand++; highlightInCard(card, searchQuery); }
    else removeHighlights(card);
  });
  document.querySelectorAll('#sidebar-land .toc-item').forEach(item => {
    const card = document.getElementById('sec-' + item.dataset.secId + '-content-land');
    item.classList.toggle('hidden', !!(card && card.classList.contains('hidden')));
  });
  document.getElementById('count-land').textContent = countLand;

  const counts = { amendments: countAmd + ' 項', house: countHouse + ' 條', land: countLand + ' 條' };
  document.getElementById('search-count').textContent = counts[currentTab] || '';
}

function highlightInCard(card, query) {
  removeHighlights(card);
  const walker = document.createTreeWalker(card, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => {
    const idx = node.textContent.toLowerCase().indexOf(query);
    if (idx >= 0) {
      const span = document.createDocumentFragment();
      const before = document.createTextNode(node.textContent.substring(0, idx));
      const mark = document.createElement('mark');
      mark.textContent = node.textContent.substring(idx, idx + query.length);
      const after = document.createTextNode(node.textContent.substring(idx + query.length));
      span.append(before, mark, after);
      node.parentNode.replaceChild(span, node);
    }
  });
}

function removeHighlights(card) {
  card.querySelectorAll('mark').forEach(m => {
    m.replaceWith(document.createTextNode(m.textContent));
  });
}

// ─── TABS ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
    if (searchQuery) {
      const counts = {
        amendments: document.getElementById('count-amendments').textContent + ' 項',
        house: document.getElementById('count-house').textContent + ' 條',
        land: document.getElementById('count-land').textContent + ' 條'
      };
      document.getElementById('search-count').textContent = counts[tab] || '';
    }
  });
});

function resetCounts() {
  document.getElementById('count-amendments').textContent = AMENDMENTS_DATA.length;
  document.getElementById('count-house').textContent = houseDoc.sections.length;
  document.getElementById('count-land').textContent = landDoc.sections.length;
  document.getElementById('search-count').textContent = '';
}

// Search input + clear button
let searchDebounce;
document.getElementById('search-input').addEventListener('input', e => {
  const val = e.target.value;
  document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => applySearch(val), 180);
});

document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  applySearch('');
  document.getElementById('search-input').focus();
});

// ─── UTILS ───
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── INIT ───
renderAmendments();
renderContract(houseDoc, 'sidebar-house', 'content-house');
renderContract(landDoc, 'sidebar-land', 'content-land');
resetCounts();
</script>
